<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>台灣鐵道 · 列車流動</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; } /* .search/.followbar 的 display:flex 會蓋掉 hidden,強制優先 */
  body {
    margin: 0;
    font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
    background: #efe6d2;
    color: #3a3226;
  }
  a { color: #2a4a73; }
  a:hover { color: #d23c2a; }
  .wrap { max-width: 1400px; margin: 0 auto; padding: 20px 20px 48px; }

  /* ── 雙欄版面:地圖主欄+右側互動欄(搜尋/最愛/旅程收集/篩選),點側欄同時看得到地圖;
     窄螢幕(<1200px)回退單欄堆疊 ── */
  .cols { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 0 18px; align-items: start; }
  .side-col { position: sticky; top: 10px; max-height: calc(100vh - 20px); overflow-y: auto; padding: 0 2px 8px; }
  @media (max-width: 1199px) {
    .cols { grid-template-columns: 1fr; }
    .side-col { position: static; max-height: none; overflow: visible; padding: 0; }
  }

  /* ── 站名牌 header ── */
  .plate {
    background: #fffdf6;
    border: 3.5px solid #2a4a73;
    border-radius: 12px;
    box-shadow: 0 3px 0 rgba(42,74,115,.22);
    padding: 14px 22px 15px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin-bottom: 10px;
  }
  .plate-side {
    display: flex; flex-direction: column; gap: 1px;
    font-size: 12px; font-weight: 700; color: #2a4a73; white-space: nowrap;
  }
  .plate-side.left { align-items: flex-start; }
  .plate-side.right { align-items: flex-end; }
  .plate-side .arr { font-size: 14px; line-height: 1; }
  .plate-mid { text-align: center; }
  header h1 {
    font-size: 28px; font-weight: 900; letter-spacing: 7px;
    color: #1e2c40; margin: 0;
  }
  .plate-sub {
    margin: 3px 0 0; font-size: 10px; letter-spacing: 3px;
    color: #8a7c62; font-weight: 600;
  }
  header p { margin: 0 0 16px; color: #7a6c50; font-size: 14px; }

  /* ── 系統切換 ── */
  .systems { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 14px; }
  .systems button {
    font: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
    background: #e6d9ba; color: #7a6c50;
    border: 1.5px solid #c9b98f; border-radius: 6px; padding: 8px 18px;
    box-shadow: 0 2px 0 #c9b98f;
  }
  .systems button.active {
    background: #d23c2a; color: #fff8ec; font-weight: 800;
    border-color: #a92c1d; box-shadow: 0 2px 0 #a92c1d;
  }

  /* ── 地圖 stage ── */
  .stage {
    position: relative;
    height: 64vh; min-height: 460px; max-height: 760px;
    background: #f7f0dd;
    border: 2px solid #c9b98f;
    border-radius: 12px;
    overflow: hidden;
  }
  #map { position: absolute; inset: 0; background: #f7f0dd; }

  /* 地圖暗色模式(只換地圖，紙牌 UI 不變) */
  .stage.dark, .stage.dark #map { background: #10141c; }
  .stage.dark { border-color: #a89468; }

  /* 衛星影像底圖 */
  .stage.sat, .stage.sat #map { background: #2e4636; }
  .stage.sat #themeBtn { display: none; }

  .leaflet-container { background: #f7f0dd; }
  .stage.dark .leaflet-container { background: #10141c; }
  .stage.sat .leaflet-container { background: #2e4636; }

  /* 地圖工具鈕(全畫面、明暗、衛星)——疊在 Leaflet 縮放鈕上方(縮放鈕在右下角) */
  .stage-tools {
    position: absolute; right: 12px; bottom: 80px; z-index: 700;
    display: flex; gap: 8px;
  }
  .stage-tools button {
    font: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    background: #fffdf6; color: #2a4a73;
    border: 1.5px solid #c9b98f; border-radius: 6px;
    box-shadow: 0 2px 0 #c9b98f;
  }
  .stage-tools button:hover { background: #f7f0dd; }
  .stage-tools button.active {
    background: #d23c2a; color: #fff8ec;
    border-color: #a92c1d; box-shadow: 0 2px 0 #a92c1d;
  }

  /* 停靠站名牌(地圖上方置中,跟隨列車停站時淡入)——仿台鐵月台站名牌:
     上半白底本站大字,下半藍條左右鄰站+站間里程+方向箭頭 */
  .dwell-plate {
    /* top 固定在時鐘徽章下方,置中時才不會與徽章重疊 */
    position: absolute; top: 58px; left: 50%; transform: translateX(-50%); z-index: 640;
    min-width: 320px; max-width: calc(100% - 24px);
    background: #fffdf6; border: 2.5px solid #2a4a73; border-radius: 10px;
    box-shadow: 0 2px 0 rgba(42,74,115,.22); overflow: hidden;
    opacity: 0; transition: opacity .45s ease; pointer-events: none;
  }
  .dwell-plate.show { opacity: 1; }
  .dwell-plate b {
    display: block; text-align: center;
    font-size: 26px; font-weight: 900; letter-spacing: 10px; text-indent: 10px; /* indent 抵銷尾字間距,視覺置中 */
    color: #1e2c40; white-space: nowrap; padding: 9px 20px 7px;
  }
  .dwell-plate .dp-strip {
    display: flex; justify-content: space-between; align-items: center; gap: 18px;
    background: #2a4a73; color: #fffdf6; padding: 5px 12px 6px;
  }
  .dwell-plate .side {
    display: flex; align-items: baseline; gap: 6px;
    font-size: 12.5px; font-weight: 700; color: #fffdf6; white-space: nowrap;
  }
  .dwell-plate .side .arr { font-size: 11px; opacity: .9; }
  .dwell-plate .side .km {
    font-size: 10.5px; font-weight: 600; opacity: .82;
    font-variant-numeric: tabular-nums;
  }

  /* 跟隨小面板(地圖左下角，跟隨列車時顯示) */
  .follow-panel {
    position: absolute; left: 12px; bottom: 12px; z-index: 650;
    width: 230px; max-height: calc(100% - 24px); overflow-y: auto;
    background: rgba(255,253,246,.97); border: 2px solid #2a4a73; border-radius: 10px;
    padding: 10px 13px 11px;
    font-variant-numeric: tabular-nums;
  }
  .follow-panel .fp-head { display: flex; align-items: center; gap: 8px; }
  .follow-panel .fp-head .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .follow-panel .fp-head b { font-size: 15px; color: #1e2c40; }
  .follow-panel .fp-head .kind { font-size: 12px; color: #7a6c50; font-weight: 600; }
  .follow-panel .fp-head .spd {
    margin-left: auto; font-size: 11px; color: #2a4a73; font-weight: 700;
    font-variant-numeric: tabular-nums; white-space: nowrap; align-self: baseline;
  }
  .follow-panel .fp-head .spd b {
    font-size: 24px; font-weight: 900; color: #d23c2a; letter-spacing: .5px;
    line-height: 1; margin-right: 2px;
  }
  .follow-panel .fp-head .fp-close {
    margin-left: 4px; background: none; border: 0; cursor: pointer;
    color: #a89468; font-size: 15px; line-height: 1; padding: 0 2px;
  }
  .follow-panel .fp-next {
    display: flex; align-items: baseline; gap: 7px;
    margin-top: 7px; padding-top: 7px; border-top: 1.5px dashed #d8cba9;
  }
  .follow-panel .fp-next .lbl { font-size: 11px; color: #8a7c62; font-weight: 800; letter-spacing: 2px; flex: none; }
  .follow-panel .fp-next .stn { font-size: 16px; font-weight: 900; color: #1e2c40; letter-spacing: 1px; }
  .follow-panel .fp-next .eta { margin-left: auto; font-size: 13px; font-weight: 700; color: #2a4a73; }
  .follow-panel .fp-next .eta b { color: #d23c2a; }
  .follow-panel .fp-prog { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
  .follow-panel .fp-prog .bar {
    flex: 1; height: 7px; background: #efe6cc;
    border: 1px solid #c9b98f; border-radius: 4px; overflow: hidden;
  }
  .follow-panel .fp-prog .bar i { display: block; height: 100%; width: 0; background: #d23c2a; }
  .follow-panel .fp-prog .txt {
    font-size: 10.5px; color: #8a7c62; font-weight: 700;
    white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  .follow-panel .fp-dest { margin-top: 4px; font-size: 11.5px; color: #7a6c50; }
  .follow-panel .fp-status {
    margin-top: 6px; font-size: 12px; font-weight: 700; color: #b4552a;
    background: #fbe9df; border: 1px solid #e0a37e; border-radius: 5px; padding: 3px 8px;
  }
  .follow-panel .fp-status.run { color: #2a6b46; background: #e9f2e4; border-color: #a8c9a4; }
  /* ── 列車資訊卡(地圖下方,跟隨時顯示) ── */
  .traincard {
    margin: 14px 0 0;
    background: #fffdf6; border: 2px solid #2a4a73; border-radius: 10px;
    box-shadow: 0 3px 0 rgba(42,74,115,.22);
    padding: 12px 16px 13px;
  }
  .traincard .tc-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: nowrap; }
  .traincard .tc-head .dot { width: 10px; height: 10px; border-radius: 50%; align-self: center; flex: none; }
  .traincard .tc-no { font-size: 20px; font-weight: 900; color: #1e2c40; letter-spacing: 1px; }
  .traincard .tc-kind { font-size: 13px; font-weight: 700; color: #7a6c50; white-space: nowrap; flex: none; }
  .traincard .tc-route {
    font-size: 13px; color: #6b5f4a; font-variant-numeric: tabular-nums;
    flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .traincard .tc-tt {
    margin-left: auto; font: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    background: #fffdf6; color: #2a4a73;
    border: 1.5px solid #c9b98f; border-radius: 5px; padding: 3px 9px;
    box-shadow: 0 1.5px 0 #c9b98f; align-self: center; flex: none;
  }
  .traincard .tc-tt:hover { background: #f7f0dd; }
  .traincard .tc-tt + .tc-tt { margin-left: 0; } /* 兩顆收放鈕:只有第一顆吃 auto 推右 */
  .traincard .tc-star {
    background: none; border: 0; cursor: pointer;
    color: #d2a12a; font-size: 20px; line-height: 1; padding: 0 2px; align-self: center;
  }
  .traincard .tc-sparkwrap { margin-top: 9px; padding-top: 7px; border-top: 1.5px dashed #d8cba9; }
  .traincard .tc-sparkwrap .lbl {
    font-size: 10.5px; font-weight: 800; letter-spacing: 2px; color: #8a7c62; margin-bottom: 3px;
  }
  .traincard .tc-sparkwrap canvas { display: block; width: 100%; height: 46px; }
  .traincard .tc-stops {
    margin-top: 9px; padding-top: 8px; border-top: 1.5px dashed #d8cba9;
    max-height: 240px; overflow-y: auto;
  }
  .traincard .tc-st {
    display: flex; gap: 12px; font-size: 12.5px; padding: 2.5px 2px;
    border-top: 1px dashed #ece2c8; cursor: pointer; color: #5d5240;
    font-variant-numeric: tabular-nums;
  }
  .traincard .tc-st:hover { background: #f7f0dd; }
  .traincard .tc-st .n { flex: 1; }
  .traincard .tc-st.hd {
    font-weight: 800; color: #a89468; border-top: 0; cursor: default;
    font-size: 11px; letter-spacing: 1px;
  }
  .traincard .tc-st.hd:hover { background: none; }
  .traincard .tc-st.past { opacity: .45; }
  .traincard .tc-st.cur { color: #d23c2a; font-weight: 800; }
  .traincard .tc-body {
    display: grid; grid-template-columns: 1.3fr 1fr; gap: 6px 26px;
    margin-top: 9px; padding-top: 9px; border-top: 1.5px dashed #d8cba9;
    height: 150px; /* 固定高度:換車/日誌增長都不跳動,超出各自捲動 */
  }
  .traincard .tc-intro { font-size: 13px; line-height: 1.65; color: #5d5240; overflow-y: auto; }
  .traincard .tc-events { display: flex; flex-direction: column; min-height: 0; }
  .traincard .tc-events #tcEvents { flex: 1; overflow-y: auto; }
  .traincard .tc-intro b.tn { color: #a3641a; }
  .traincard .tc-intro .amen { display: block; margin-top: 5px; color: #2a4a73; font-weight: 600; font-size: 12.5px; }
  .traincard .tc-events .lbl {
    font-size: 11px; font-weight: 800; letter-spacing: 3px; color: #a89468; margin-bottom: 4px;
  }
  .traincard .tc-ev {
    font-size: 12.5px; color: #5d5240; padding: 2.5px 0; display: flex; gap: 8px;
    border-top: 1px dashed #ece2c8;
  }
  .traincard .tc-ev .tt { color: #a89468; font-variant-numeric: tabular-nums; flex: none; }
  .traincard .tc-empty { font-size: 12.5px; color: #8a7c62; }
  .traincard .tc-intro .fact { display: block; margin-top: 5px; color: #8a7c62; font-size: 12px; }

  /* ── 最愛列車 chips ── */
  .favs { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 2px 0; }
  .favs .lbl {
    flex-basis: 100%; color: #a89468; font-size: 11px; font-weight: 800;
    letter-spacing: 3px; padding-bottom: 3px; border-bottom: 1.5px dashed #d8cba9;
  }
  .favchip {
    display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px;
    padding: 5px 10px; border: 1.5px solid #c9b98f; border-radius: 4px;
    background: #fffdf6; cursor: pointer; color: #3a3226; user-select: none;
  }
  .favchip:hover { background: #f7f0dd; }
  .favchip .star { color: #d2a12a; }
  .favchip b { color: #1e2c40; }
  .favchip .rm { color: #a89468; margin-left: 2px; font-weight: 700; padding: 0 2px; }
  .favchip .rm:hover { color: #d23c2a; }

  /* ── 旅程護照(首頁完乘記錄+圖鑑收集) ── */
  .passport {
    margin: 16px 2px 0; background: #fffdf6;
    border: 2px solid #2a4a73; border-radius: 10px;
    box-shadow: 0 3px 0 rgba(42,74,115,.22); padding: 12px 16px 14px;
  }
  .passport .ph-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .passport .ph-head > b { font-size: 16px; font-weight: 900; letter-spacing: 3px; color: #1e2c40; }
  .passport .ph-sub { font-size: 11px; color: #8a7c62; }
  .passport .ph-stats { margin-left: auto; font-size: 12.5px; color: #5d5240; font-variant-numeric: tabular-nums; }
  .passport .ph-stats b { color: #d23c2a; }
  .passport .ph-sec {
    display: flex; align-items: baseline; gap: 6px;
    font-size: 11px; font-weight: 800; letter-spacing: 3px; color: #a89468;
    margin: 11px 0 6px; padding-bottom: 3px; border-bottom: 1.5px dashed #d8cba9;
  }
  .passport .ph-sec b { color: #2a4a73; letter-spacing: 0; }
  .passport .ph-stamps { display: flex; flex-wrap: wrap; gap: 6px; }
  .passport .stamp {
    font-size: 12px; font-weight: 600; color: #a89468; cursor: pointer;
    background: #f7f0dd; border: 1.5px dashed #c9b98f; border-radius: 5px; padding: 3px 9px;
  }
  .passport .stamp:hover { background: #efe6cc; }
  .passport .stamp.got {
    color: #1e2c40; font-weight: 800; cursor: default;
    background: #fff6df; border: 1.5px solid #d2a12a; box-shadow: 0 1.5px 0 #d2a12a;
  }
  .passport .ph-list { max-height: 230px; overflow-y: auto; }
  .passport .ph-row {
    display: flex; align-items: baseline; gap: 10px; font-size: 12.5px; color: #5d5240;
    padding: 3px 2px; border-top: 1px dashed #ece2c8; font-variant-numeric: tabular-nums;
  }
  .passport .ph-row .d { color: #a89468; flex: none; }
  .passport .ph-row b { color: #1e2c40; min-width: 44px; }
  .passport .ph-row .k { flex: none; color: #2a4a73; font-weight: 600; }
  .passport .ph-row .r { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .passport .ph-row .km { color: #8a7c62; }
  .passport .ph-empty { font-size: 12.5px; color: #8a7c62; }
  .passport .stamp.na { cursor: help; } /* 成就徽章不可點,滑過看解鎖條件 */

  /* ── 收集通知(toast):地圖上方置中彈出後自動消失,一般/全畫面/放空都看得到 ── */
  .toasts {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 720;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    pointer-events: none; max-width: calc(100% - 24px);
  }
  .toast {
    background: #fffdf6; border: 2px solid #d2a12a; border-radius: 10px;
    box-shadow: 0 3px 0 rgba(163,100,26,.3);
    padding: 9px 18px; font-size: 14px; font-weight: 700; color: #1e2c40;
    white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
    opacity: 0; transform: translateY(-10px); transition: opacity .4s ease, transform .4s ease;
  }
  .toast.show { opacity: 1; transform: none; }
  .toast b { color: #a3641a; }

  /* 全畫面模式 */
  body.fs { overflow: hidden; }
  body.fs .stage {
    position: fixed; inset: 0; z-index: 1000;
    height: 100vh; max-height: none; min-height: 0;
    border: 0; border-radius: 0;
  }
  /* 全畫面時:控制列浮在底部中央、資訊卡浮在右下、工具鈕移右上、面板讓出高度 */
  body.fs .controls {
    position: fixed; left: 50%; bottom: 12px; transform: translateX(-50%);
    z-index: 1001; margin: 0; width: max-content; max-width: calc(100vw - 20px);
    background: rgba(255,253,246,.96); border: 2px solid #2a4a73; border-radius: 10px;
    padding: 7px 12px; gap: 8px 10px;
  }
  /* 全畫面控制列瘦身:壓成一排,音樂不落到第二排(速度/時間字樣藏起,預設倍速鈕縮小保留) */
  body.fs .controls button.pp { font-size: 12.5px; padding: 5px 9px; gap: 4px; }
  body.fs .controls .ctl { gap: 6px; }
  body.fs .controls .ctl label { display: none; }
  body.fs .controls .ctl output { font-size: 12px; min-width: 36px; }
  body.fs .controls input[type=range] { width: 88px; }
  body.fs .controls .spd-btns { gap: 3px; }
  body.fs .controls .spd-btns button { font-size: 11px; padding: 3px 6px; }
  body.fs .controls #musicVol { width: 64px; }
  /* 全畫面跟隨:資訊卡塞進左下跟隨面板,合併成一張可收放的卡(placeTrainCard 搬 DOM) */
  body.fs .follow-panel { bottom: 12px; width: 300px; max-height: calc(100vh - 90px); }
  body.fs .follow-panel .traincard {
    position: static; width: auto; margin: 9px -13px -11px; padding: 9px 13px 10px;
    border: 0; border-top: 1.5px dashed #d8cba9; border-radius: 0; box-shadow: none;
    max-height: none;
  }
  /* 合併卡:車號/車種/起訖都跟上方跟隨面板重複,只留收放鈕列 */
  body.fs .follow-panel .tc-route,
  body.fs .follow-panel .tc-head .dot,
  body.fs .follow-panel .tc-no,
  body.fs .follow-panel .tc-kind { display: none; }
  body.fs .follow-panel .tc-body { grid-template-columns: 1fr; height: auto; gap: 7px; }
  body.fs .follow-panel .tc-intro { height: 76px; }   /* 固定高:放空換車不跳動 */
  body.fs .follow-panel .tc-events #tcEvents { flex: none; height: 88px; }
  body.fs .stage-tools { top: 12px; bottom: auto; flex-direction: column; }
  body.fs .board { right: 60px; }
  body.fs .kbd-hint, body.fs .flow, body.fs .search, body.fs .favs, body.fs .lines, body.fs .note, body.fs .passport { display: none; }
  /* 放空模式:閒置 5 秒淡出控制,滑鼠動了淡回(時鐘與跟隨面板留著) */
  .controls, .stage-tools, .leaflet-control-container { transition: opacity .7s; }
  body.idle .controls, body.idle .stage-tools, body.idle .leaflet-control-container { opacity: 0; pointer-events: none; }
  body.idle .stage, body.idle * { cursor: none; }
  #overlay { position: absolute; inset: 0; pointer-events: none; z-index: 500; }
  /* 放空模式的日夜天色(依模擬時刻連續變化,墊在轉場遮罩下) */
  #skyTint { position: absolute; inset: 0; z-index: 550; pointer-events: none; }

  /* 放空模式換車的淡出淡入遮罩(蓋地圖與列車,不蓋時鐘/跟隨面板) */
  #veil {
    position: absolute; inset: 0; z-index: 560; background: #101826;
    opacity: 0; pointer-events: none; transition: opacity .7s ease;
  }

  /* ── HUD 小牌 ── */
  .badge {
    position: absolute; top: 12px; left: 14px; z-index: 600;
    display: flex; gap: 12px; align-items: baseline;
    font-variant-numeric: tabular-nums; pointer-events: none;
    background: #fffdf6; border: 2px solid #2a4a73; border-radius: 8px;
    padding: 6px 14px 7px;
  }
  .badge .clock { font-size: 22px; font-weight: 900; color: #1e2c40; }
  .badge .peak { font-size: 12px; font-weight: 800; padding: 2px 9px; border-radius: 3px; }
  .badge .count { font-size: 13px; color: #7a6c50; font-weight: 600; }
  .badge .ver { font-size: 10px; color: #b3a37e; font-weight: 600; letter-spacing: .5px; }
  .badge .live { font-size: 11px; font-weight: 800; color: #1d9e55; letter-spacing: .5px; cursor: help; }
  .badge .live::before { content: '●'; margin-right: 3px; animation: livePulse 2s infinite; }
  @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  .lateTag { color: #d23c2a; font-weight: 800; font-size: 11px; margin-left: 4px; }

  /* ── 控制列 ── */
  .controls {
    display: flex; flex-wrap: wrap; gap: 18px 24px;
    align-items: center; margin: 16px 2px 0;
  }
  .ctl { display: flex; align-items: center; gap: 10px; }
  .ctl label { font-size: 13px; color: #7a6c50; font-weight: 600; white-space: nowrap; }
  .ctl output { font-size: 13px; font-weight: 800; min-width: 48px; color: #1e2c40; }
  input[type=range] { accent-color: #d23c2a; width: 150px; }
  button.pp {
    font: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
    background: #fffdf6; color: #2a4a73;
    border: 1.5px solid #c9b98f; border-radius: 6px;
    padding: 7px 14px; display: inline-flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 0 #c9b98f;
  }
  button.pp:hover { background: #f7f0dd; }
  button.pp.on {
    background: #2a4a73; color: #fffdf6;
    border-color: #1e2c40; box-shadow: 0 2px 0 #1e2c40;
  }
  button.pp.on:hover { background: #34567f; }
  #musicCtl { gap: 8px; }
  #musicVol { width: 96px; }
  .spd-btns { display: flex; gap: 4px; }
  .spd-btns button {
    font: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    background: #fffdf6; color: #2a4a73;
    border: 1.5px solid #c9b98f; border-radius: 5px; padding: 4px 8px;
    box-shadow: 0 1.5px 0 #c9b98f;
  }
  .spd-btns button:hover { background: #f7f0dd; }
  .spd-btns button.active {
    background: #2a4a73; color: #fffdf6;
    border-color: #1e2c40; box-shadow: 0 1.5px 0 #1e2c40;
  }
  .kbd-hint { margin: 8px 2px 0; color: #a89468; font-size: 12px; line-height: 1.9; }
  .kbd-hint b {
    color: #7a6c50; font-weight: 700; background: #e6d9ba;
    border: 1px solid #c9b98f; border-radius: 4px; padding: 0 5px; margin: 0 2px;
  }

  /* ── 圖例票根 ── */
  .lines { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 2px 0; }
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12.5px; padding: 5px 12px 5px 8px; border-radius: 4px;
    border: 1.5px solid #c9b98f; background: #e6d9ba; cursor: pointer;
    user-select: none; transition: opacity .15s; color: #3a3226;
  }
  .chip::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: #efe6d2; border: 1px solid #a89468; flex: none;
  }
  .chip .dot { width: 11px; height: 11px; border-radius: 50%; }
  .chip.off { opacity: .38; }
  .legend-sep { flex-basis: 100%; height: 0; }
  .legend-lbl {
    flex-basis: 100%; color: #a89468; font-size: 11px; font-weight: 800;
    letter-spacing: 3px; margin: 8px 2px -2px;
    padding-bottom: 3px; border-bottom: 1.5px dashed #d8cba9;
  }
  .note { margin: 22px 2px 0; color: #8a7c62; font-size: 13px; line-height: 1.6; }

  /* ── 搜尋+跟隨票 ── */
  .search { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin: 14px 2px 0; }
  .search input[type=text] {
    font: inherit; font-size: 14px; background: #fffdf6; color: #3a3226;
    border: 1.5px solid #c9b98f; border-radius: 6px; padding: 8px 12px; width: 260px;
  }
  .search input::placeholder { color: #a89468; }
  .followbar {
    display: inline-flex; align-items: center; gap: 9px; font-size: 13px;
    background: #e6d9ba; border: 1.5px solid #c9b98f; border-radius: 4px;
    padding: 6px 13px; color: #3a3226; font-variant-numeric: tabular-nums;
  }
  .followbar b { color: #1e2c40; font-size: 14px; }
  .followbar .dot { width: 9px; height: 9px; border-radius: 50%; }
  .followbar button {
    font: inherit; font-size: 12px; font-weight: 700; cursor: pointer;
    background: #d23c2a; color: #fff8ec;
    border: 1px solid #a92c1d; border-radius: 4px; padding: 3px 9px;
  }
  .followbar.miss { background: #fbe9df; border-color: #e0a37e; color: #b4552a; }

  /* ── 車站時刻板 ── */
  .board {
    position: absolute; top: 12px; right: 12px; z-index: 650;
    width: 272px; max-height: calc(100% - 24px); overflow-y: auto;
    background: rgba(255,253,246,.97); border: 2px solid #2a4a73; border-radius: 10px;
    padding: 12px 14px;
  }
  .board h3 { margin: 0 18px 1px 0; font-size: 16px; font-weight: 900; letter-spacing: 3px; color: #1e2c40; }
  .board .sub { color: #8a7c62; font-size: 11px; margin-bottom: 7px; }
  .board .row { display: flex; align-items: baseline; gap: 8px; padding: 5px 0; border-top: 1.5px dashed #d8cba9; font-size: 13px; }
  .board .row[data-no] { cursor: pointer; }
  .board .row[data-no]:hover { background: #f7f0dd; }
  .board .row b { color: #1e2c40; }
  .board .row .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; align-self: center; }
  .board .row .dest { flex: 1; color: #6b5f4a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .board .row .t, .board .row .min { font-variant-numeric: tabular-nums; }
  .board .row .min { color: #2a4a73; font-weight: 700; min-width: 44px; text-align: right; }
  .board .close { position: absolute; top: 7px; right: 9px; background: none; border: 0; color: #a89468; font-size: 17px; cursor: pointer; line-height: 1; }
  .board .empty { color: #8a7c62; font-size: 13px; padding: 8px 0; }
  /* 今日亮點(探索面板)的分節標題,共用 .board 外觀 */
  .board .sec {
    color: #a89468; font-size: 11px; font-weight: 800; letter-spacing: 3px;
    margin: 10px 0 1px; padding-bottom: 3px; border-bottom: 1.5px dashed #d8cba9;
  }
  /* 亮點面板條目多,下緣讓開右下角工具鈕(bottom 80px+鈕高 38px),面板內自行捲動 */
  #explorePanel { max-height: calc(100% - 132px); }
  /* 我的最愛面板(共用 .board 外觀) */
  #favBtn { color: #d2a12a; }
  #favPanel .row.fv { cursor: pointer; }
  #favPanel .row.fv:hover { background: #f7f0dd; }
  #favPanel .row .rm { margin-left: auto; color: #a89468; font-weight: 700; padding: 0 4px; }
  #favPanel .row .rm:hover { color: #d23c2a; }
  /* 旅程收集面板(完乘章;共用 .board 外觀) */
  .board .ride-stats { font-size: 12.5px; color: #5d5240; margin: 2px 0 6px; }
  .board .ride-stats b { color: #d23c2a; font-variant-numeric: tabular-nums; }
  .board .ride-kinds { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 7px; }
  .board .kindchip {
    font-size: 10.5px; font-weight: 700; color: #2a4a73;
    background: #eee5ca; border: 1px solid #c9b98f; border-radius: 4px; padding: 1px 6px;
  }

  /* ── 流量圖 ── */
  .flow { margin: 14px 2px 0; }
  .flow canvas { display: block; width: 100%; height: 64px; cursor: crosshair; border: 1.5px solid #c9b98f; border-radius: 6px; background: #fffdf6; }
  .flow .lbl { color: #8a7c62; font-size: 12px; margin-top: 5px; font-variant-numeric: tabular-nums; }

  /* ── 手機直立版 ── */
  @media (max-width: 640px) {
    .wrap { padding: 12px 12px 40px; }
    .plate { padding: 10px 14px 11px; border-width: 3px; }
    header h1 { font-size: 19px; letter-spacing: 4px; }
    .plate-sub { font-size: 9px; letter-spacing: 2px; }
    .plate-side { font-size: 10px; }
    .plate-side .arr { font-size: 12px; }
    header p { font-size: 13px; }
    .stage { height: 58vh; min-height: 380px; }
    .badge { top: 8px; left: 8px; gap: 9px; padding: 5px 11px 6px; }
    .badge .clock { font-size: 18px; }
    .badge .count { font-size: 12px; }
    /* 手機:時刻板改底部 sheet,工具鈕改右上直排,避開 HUD 與 sheet */
    .stage-tools { top: 8px; right: 8px; bottom: auto; flex-direction: column; }
    /* 手機改用雙指縮放,隱藏 Leaflet +/- 鈕(否則會壓在底部 sheet 上) */
    .leaflet-control-zoom { display: none; }
    .board {
      top: auto; bottom: 8px; left: 8px; right: 8px; width: auto;
      max-height: 46%;
      border-radius: 10px;
    }
    .controls { gap: 10px 14px; margin-top: 12px; }
    .ctl { flex: 1 1 100%; }
    .ctl input[type=range] { flex: 1; width: auto; }
    .search input[type=text] { flex: 1 1 100%; width: auto; }
    .followbar { flex-wrap: wrap; }
    .chip { font-size: 12px; padding: 4px 10px 4px 7px; }
    .follow-panel { left: 8px; bottom: 8px; width: 200px; }
    .traincard { padding: 11px 13px 12px; }
    .traincard .tc-body { grid-template-columns: 1fr; }
    .traincard .tc-events { margin-top: 4px; }
    .kbd-hint { display: none; }
    /* 手機全畫面:資訊卡太佔位就不浮出,控制列貼底、面板讓位 */
    body.fs .traincard { display: none; }
    body.fs .controls { bottom: 8px; width: calc(100vw - 16px); padding: 7px 12px; }
    body.fs .follow-panel { bottom: 132px; }
    body.fs .stage-tools { top: 8px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="plate">
      <div class="plate-side left"><span class="arr">◀</span><span id="plateL">基隆</span></div>
      <div class="plate-mid">
        <h1>台灣鐵道 · 列車流動</h1>
        <p class="plate-sub" id="plateSub">TAIWAN RAILWAY LIVE</p>
      </div>
      <div class="plate-side right"><span class="arr">▶</span><span id="plateR">枋寮</span></div>
    </div>
    <p id="lead">列車依真實時刻表在島上跑來跑去 — 點列車直接跟隨、點車站看誰要來。</p>
  </header>

  <div class="systems" id="systems"></div>

  <div class="cols">
  <div class="main-col">
  <div class="stage">
    <div id="map"></div>
    <canvas id="overlay"></canvas>
    <div id="skyTint"></div>
    <div id="veil"></div>
    <div class="toasts" id="toasts"></div>
    <div class="follow-panel" id="followPanel" hidden>
      <div class="fp-head">
        <span class="dot" id="fpDot"></span>
        <b id="fpTrain"></b><span class="kind" id="fpKind"></span>
        <span class="spd" id="fpSpd"></span>
        <button class="fp-close" id="fpClose" title="取消跟隨">×</button>
      </div>
      <div class="fp-next">
        <span class="lbl">下一站</span>
        <span class="stn" id="fpNext"></span>
        <span class="eta" id="fpEta"></span>
      </div>
      <div class="fp-prog">
        <div class="bar"><i id="fpProgFill"></i></div>
        <span class="txt" id="fpProgTxt"></span>
      </div>
      <div class="fp-status" id="fpStatus" hidden></div>
      <div class="fp-dest" id="fpDest"></div>
    </div>
    <div class="stage-tools">
      <button id="exploreBtn" title="今日亮點——特別列車與今日之最">探</button>
      <button id="favBtn" title="我的最愛列車">★</button>
      <button id="rideBtn" title="旅程收集（完乘記錄）">🎫</button>
      <button id="tourBtn" title="隨機跟隨列車（螢幕保護模式）">隨</button>
      <button id="satBtn" title="切換衛星影像">衛</button>
      <button id="themeBtn" title="地圖明暗切換">☾</button>
      <button id="fsBtn" title="全畫面地圖（Esc 退出）">⛶</button>
    </div>
    <div class="badge">
      <span class="clock" id="clock">08:00</span>
      <span class="live" id="liveBadge" hidden>LIVE</span>
      <span class="peak" id="peak"></span>
      <span class="count" id="count"></span>
      <span class="ver" id="buildVer"></span>
    </div>
    <div class="dwell-plate" id="dwellPlate">
      <b id="dpName"></b>
      <div class="dp-strip">
        <span class="side left"><span class="arr">◀</span><span id="dpPrev"></span><span class="km" id="dpPrevKm"></span></span>
        <span class="side right"><span class="km" id="dpNextKm"></span><span id="dpNext"></span><span class="arr">▶</span></span>
      </div>
    </div>
    <div class="board" id="board" hidden></div>
    <div class="board" id="favPanel" hidden></div>
    <div class="board" id="ridePanel" hidden></div>
    <div class="board" id="explorePanel" hidden></div>
  </div>

  <div class="traincard" id="trainCard" hidden>
    <div class="tc-head">
      <span class="dot" id="tcDot"></span>
      <b class="tc-no" id="tcNo"></b>
      <span class="tc-kind" id="tcKind"></span>
      <span class="tc-route" id="tcRoute"></span>
      <button class="tc-tt" id="tcSC">曲線 ▴</button>
      <button class="tc-tt" id="tcTT">時刻表 ▾</button>
      <button class="tc-star" id="tcStar" title="加入最愛">☆</button>
    </div>
    <div class="tc-body">
      <div class="tc-intro" id="tcIntro"></div>
      <div class="tc-events">
        <div class="lbl">旅程日誌</div>
        <div id="tcEvents"></div>
      </div>
    </div>
    <div class="tc-sparkwrap">
      <div class="lbl">全程速度曲線</div>
      <canvas id="tcSpark" height="46"></canvas>
    </div>
    <div class="tc-stops" id="tcStops" hidden></div>
  </div>

  <div class="controls">
    <button class="pp" id="pp"><span id="ppIcon">❚❚</span><span id="ppTxt">暫停</span></button>
    <div class="ctl">
      <label for="speed">速度</label>
      <input type="range" id="speed" min="1" max="60" step="1" value="50" />
      <output id="speedOut">50×</output>
      <div class="spd-btns" id="spdBtns">
        <button data-v="1">1×</button><button data-v="10">10×</button><button data-v="30">30×</button><button data-v="60">60×</button>
      </div>
    </div>
    <div class="ctl">
      <label for="tod">時間</label>
      <input type="range" id="tod" min="5" max="24" step="1" value="8" />
      <output id="todOut">08:00</output>
    </div>
    <button class="pp" id="nowBtn" title="跳到現在的真實時間">現在</button>
    <button class="pp" id="ambientBtn" title="全畫面+自動換車跟隨，掛著放空用">🌙 放空模式</button>
    <div class="ctl" id="musicCtl" title="背景音樂（進放空模式會自動開始）">
      <button class="pp" id="musicBtn" title="播放/停止背景音樂">🎵 音樂</button>
      <input type="range" id="musicVol" min="0" max="100" step="1" value="50" aria-label="音量" />
    </div>
  </div>

  <p class="kbd-hint">快捷鍵：<b>空白鍵</b>暫停／播放　<b>1</b>–<b>4</b>速度　<b>←</b><b>→</b>時間 ±10 分　<b>F</b>全畫面　地圖角落<b>隨</b>＝隨機跟隨（螢幕保護）</p>

  <div class="flow" id="flowWrap" hidden>
    <canvas id="flowChart"></canvas>
    <div class="lbl" id="flowLbl">全日同時運行列車數（依時刻表）——點擊圖表跳到該時刻</div>
  </div>

  <p class="note" id="note"></p>
  </div>

  <aside class="side-col">
    <div class="search" id="searchRow" hidden>
      <input type="text" id="trainSearch" list="trainList" placeholder="搜尋車次跟隨（如 123、2103）" autocomplete="off" />
      <datalist id="trainList"></datalist>
      <div class="followbar" id="followBar" hidden></div>
    </div>

    <div class="favs" id="favRow" hidden></div>

    <div class="passport" id="passport" hidden></div>

    <div class="lines" id="lineToggles"></div>
  </aside>
  </div>
</div>

<script>
// 版本戳記:每次改版 push 前手動遞增(字母序),畫面時鐘徽章與 console 都會顯示,
// 供比對線上跑的是不是最新版(瀏覽器快取 max-age=600 常讓人看到舊版)
const BUILD = 'v0709m';
const state = {
  systems: [], sysId: null, data: null, speed: 36, mode: 'freq',
  lines: [], visible: new Set(), trains: [], schedStations: [], types: [],
  playing: true, speedMult: 50, hour: 8, simSec: 8 * 3600,
  dpr: 1, t0: 0, elapsed: 0, ready: false,
  followTrain: null, followId: null,
  mapDark: false, basemap: 'map', trackData: null,
  live: null, // 台鐵即時誤點 {map: 車次→誤點分, at: 抓取時刻, delayed, srcAt}
};
let map, cv, ctx;
let baseLayers = {}; // light / dark / sat Leaflet 圖層
const PEAK = [[7, 9], [17, 19.5]];
const SCHED_K = 1; // 1x speed = real time (1 sim-second per real-second)
const FONT = '-apple-system, "PingFang TC", "Noto Sans TC", sans-serif';

// 地圖三種底圖對應的 canvas 配色(軌道/站名/車站點/列車標籤外框)——見 design-mock 檔頭 spec B/D
const MAP_PAL = {
  light: { stnFill: '#f7f0dd', lbl: '#3a3226', lblStroke: 'rgba(255,253,246,.92)', tagOutline: '#fffdf6',            railAlpha: 0.9 },
  dark:  { stnFill: '#10141c', lbl: '#e8e4d8', lblStroke: 'rgba(16,20,28,.9)',     tagOutline: 'rgba(16,20,28,.9)',  railAlpha: 0.75 },
  sat:   { stnFill: '#24382c', lbl: '#ffffff', lblStroke: 'rgba(20,30,20,.85)',    tagOutline: 'rgba(20,30,20,.85)', railAlpha: 0.95 },
};
function pal() { return MAP_PAL[state.basemap === 'sat' ? 'sat' : (state.mapDark ? 'dark' : 'light')]; }

// 各系統的站名牌／副標／導言文案(loadSystem 依系統套用)
const SYS_META = {
  mrt:       { plateL: '淡水', plateR: '象山', sub: 'TAIPEI METRO LIVE',    lead: '各線列車依 TDX 班距與站間時間在城市裡穿梭（班距模擬示意，非即時班次）— 拖曳、縮放看看。' },
  krtc:      { plateL: '小港', plateR: '岡山', sub: 'KAOHSIUNG METRO LIVE', lead: '紅橘兩線與環狀輕軌正在港都穿梭（班距模擬示意，非即時班次）— 拖曳、縮放看看。' },
  tmrt:      { plateL: '北屯總站', plateR: '高鐵臺中站', sub: 'TAICHUNG METRO LIVE', lead: '綠線列車沿著文心路跑（班距模擬示意，非即時班次）— 拖曳、縮放看看。' },
  tra_sched: { plateL: '基隆', plateR: '枋寮', sub: 'TAIWAN RAILWAY LIVE',  lead: '列車依當日時刻表運行，回到現在時刻（1×）會自動套用台鐵即時誤點修正 — 點列車跟隨、點車站看班次，或按地圖角落「探」看今日亮點列車。' },
};

// 播放/速度/時間的統一入口(控制列、快捷鍵、全畫面控制共用)
function togglePlay() {
  state.playing = !state.playing;
  document.getElementById('ppIcon').textContent = state.playing ? '❚❚' : '▶';
  document.getElementById('ppTxt').textContent = state.playing ? '暫停' : '播放';
}
function setSpeed(v) {
  state.speedMult = v;
  document.getElementById('speed').value = v;
  document.getElementById('speedOut').textContent = v + '×';
  document.querySelectorAll('#spdBtns button').forEach(b =>
    b.classList.toggle('active', +b.dataset.v === v));
}
function syncTimeUI() {
  document.getElementById('tod').value = Math.floor(state.simSec / 60);
  document.getElementById('todOut').textContent = fmtHM(state.simSec);
  document.getElementById('clock').textContent = fmtHM(state.simSec);
}
function setSimSec(sec) {
  state.simSec = ((sec % 86400) + 86400) % 86400;
  syncTimeUI();
  if (state.boardStation) renderBoard();
  updateCount();
}

function isPeak(h) { return PEAK.some(([a, b]) => h >= a && h < b); }
function headwayOf(ln, h) { return isPeak(h) ? ln.peakHeadwaySec : ln.offpeakHeadwaySec; }
function haversineKm(a, b) {
  const R = 6371, toR = Math.PI / 180;
  const dLat = (b.lat - a.lat) * toR, dLon = (b.lon - a.lon) * toR;
  const la1 = a.lat * toR, la2 = b.lat * toR;
  const x = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLon / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(x));
}
function fmtHour(h) { return String(Math.floor(h) % 24).padStart(2, '0') + ':00'; }
function fmtHM(sec) {
  sec = ((sec % 86400) + 86400) % 86400;
  return String(Math.floor(sec / 3600)).padStart(2, '0') + ':' + String(Math.floor(sec % 3600 / 60)).padStart(2, '0');
}

const TRA_ABBR = {
  '縱貫線北段': '縱北', '山線': '山線', '海線': '海線', '縱貫線南段': '縱南',
  '屏東線': '屏東', '南迴線': '南迴', '臺東線': '臺東', '北迴線': '北迴', '宜蘭線': '宜蘭',
};
function abbrOf(ln) {
  if (/^[A-Za-z]/.test(ln.id)) return ln.id.split('_')[0];
  return TRA_ABBR[ln.id] || ln.name.replace(/（.*$/, '');
}
function textColorFor(hex) {
  const m = hex.replace('#', '');
  const r = parseInt(m.slice(0, 2), 16), g = parseInt(m.slice(2, 4), 16), b = parseInt(m.slice(4, 6), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) > 150 ? '#111' : '#fff';
}

function reproject() {
  if (!map || !state.data) return;
  const size = map.getSize();
  state.dpr = window.devicePixelRatio || 1;
  cv.width = size.x * state.dpr; cv.height = size.y * state.dpr;
  cv.style.width = size.x + 'px'; cv.style.height = size.y + 'px';
  ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
  const projShape = ln => {
    if (ln.shape) ln.shapePts = ln.shape.map(c => {
      const p = map.latLngToContainerPoint([c[0], c[1]]);
      return { x: p.x, y: p.y };
    });
  };
  state.lines.forEach(ln => {
    ln.pts = ln.stations.map(s => {
      const p = map.latLngToContainerPoint([s.lat, s.lon]);
      return { x: p.x, y: p.y };
    });
    projShape(ln);
  });
  if (state.trackLines) state.trackLines.forEach(projShape);
}

// 跟隨路線高亮:跟車時抽出全程折線一次(lat/lon),drawSched 每幀轉螢幕座標描光暈
function shapeSlice(ln, dA, dB) {
  ensureCum(ln);
  const lo = Math.min(dA, dB), hi = Math.max(dA, dB);
  const pts = [posAlongShape(ln, lo)];
  for (let i = 0; i < ln.shape.length; i++) {
    if (ln.cum[i] <= lo) continue;
    if (ln.cum[i] >= hi) break;
    pts.push({ lat: ln.shape[i][0], lon: ln.shape[i][1] });
  }
  pts.push(posAlongShape(ln, hi));
  if (dA > dB) pts.reverse(); // 依行進方向排列,里程遞減的車段與段才接得起來(否則畫出跳站直線弦)
  return pts;
}
function buildFollowRoute(tr) {
  let pts = [];
  for (let i = 0; i < tr.stops.length - 1; i++) {
    const s = tr.stops[i], nx = tr.stops[i + 1];
    pts = pts.concat(s.segLn ? shapeSlice(s.segLn, s.dA, s.dB)
      : [{ lat: s.lat, lon: s.lon }, { lat: nx.lat, lon: nx.lon }]);
  }
  // 長途車折線可達數千點,均勻抽稀省每幀投影。CAP 太低會切彎角:433km 車 1200 點=點距360m,
  // z14 就看得出高亮偏離軌道;4800 點=點距90m,弓高<3m 在任何 zoom 都貼軌
  const CAP = 4800;
  if (pts.length > CAP) {
    const step = pts.length / CAP, out = [];
    for (let i = 0; i < pts.length; i += step) out.push(pts[Math.floor(i)]);
    out.push(pts[pts.length - 1]);
    pts = out;
  }
  return pts;
}

// cumulative km per shape vertex (static, computed once)
function ensureCum(ln) {
  if (ln.cum || !ln.shape) return;
  const sh = ln.shape, c = [0];
  for (let i = 1; i < sh.length; i++)
    c[i] = c[i - 1] + haversineKm({ lat: sh[i - 1][0], lon: sh[i - 1][1] }, { lat: sh[i][0], lon: sh[i][1] });
  ln.cum = c;
}
// arc-length (km) along a line's shape -> {lat,lon}
function posAlongShape(ln, dist) {
  const sh = ln.shape, cum = ln.cum, n = sh.length;
  if (dist <= 0) return { lat: sh[0][0], lon: sh[0][1] };
  if (dist >= cum[n - 1]) return { lat: sh[n - 1][0], lon: sh[n - 1][1] };
  let lo = 0, hi = n - 1;
  while (lo + 1 < hi) { const m = (lo + hi) >> 1; if (cum[m] <= dist) lo = m; else hi = m; }
  const seg = cum[hi] - cum[lo], f = seg > 0 ? (dist - cum[lo]) / seg : 0;
  return { lat: sh[lo][0] + (sh[hi][0] - sh[lo][0]) * f, lon: sh[lo][1] + (sh[hi][1] - sh[lo][1]) * f };
}

const DWELL_SEC = 25;
function buildLineSchedule(ln) {
  ensureCum(ln);
  const hasShape = !!(ln.shape && ln.stations[0].d != null);
  const fwd = ln.stations, n = fwd.length;
  const loop = !!ln.loop && hasShape;
  // 環線:單向循環,尾端補回起點;一般線:去程+回程折返
  const seq = loop ? fwd.concat([{ ...fwd[0], d: ln.cum[ln.cum.length - 1] }])
    : fwd.concat(fwd.slice(0, -1).reverse());
  // seq 第 i 步(seq[i-1]→seq[i])對應的前向段索引:環線直取、折返段鏡射
  const segIdx = i => loop ? i - 1 : (i <= n - 1 ? i - 1 : 2 * (n - 1) - i);
  const nodes = []; let t = 0;
  for (let i = 0; i < seq.length; i++) {
    if (i > 0) {
      const sg = ln.segs && ln.segs[segIdx(i)];
      if (sg && sg.run > 0) t += sg.run; // TDX 真實站間行駛秒
      else {
        const gap = hasShape ? Math.abs(seq[i].d - seq[i - 1].d) : haversineKm(seq[i - 1], seq[i]);
        t += gap / state.speed * 3600;
      }
    }
    const dw = seq[i].dwell || DWELL_SEC; // TDX 真實停站秒(缺值 25s)
    nodes.push({ lat: seq[i].lat, lon: seq[i].lon, dist: seq[i].d, arr: t, dep: t + dw });
    t += dw;
  }
  ln.sched = nodes; ln.period = t; ln.hasShape = hasShape;
}
function posPeriodic(ln, t) {
  const nodes = ln.sched, n = nodes.length;
  const tm = ((t % ln.period) + ln.period) % ln.period;
  let node = null, interp = null;
  for (let i = 0; i < n; i++) {
    if (tm >= nodes[i].arr && tm <= nodes[i].dep) { node = nodes[i]; break; }
    if (i < n - 1 && tm > nodes[i].dep && tm < nodes[i + 1].arr) {
      const span = nodes[i + 1].arr - nodes[i].dep, f = span > 0 ? (tm - nodes[i].dep) / span : 0;
      interp = { a: nodes[i], b: nodes[i + 1], f }; break;
    }
  }
  if (!node && !interp) node = nodes[n - 1];
  if (ln.hasShape) {
    const dist = node ? node.dist : interp.a.dist + (interp.b.dist - interp.a.dist) * interp.f;
    return posAlongShape(ln, dist);
  }
  if (node) return { lat: node.lat, lon: node.lon };
  return { lat: interp.a.lat + (interp.b.lat - interp.a.lat) * interp.f, lon: interp.a.lon + (interp.b.lon - interp.a.lon) * interp.f };
}

function trainPos(tr, t) {
  t -= liveDelaySec(tr);
  const s = tr.stops, n = s.length;
  // 跨午夜車次(時刻編碼 >86400):simSec 歸零後把前一日班次接續回來
  if (t < s[0].arrSec && t + 86400 <= s[n - 1].depSec) t += 86400;
  if (t < s[0].arrSec || t > s[n - 1].depSec) return null;
  for (let i = 0; i < n; i++) {
    if (t >= s[i].arrSec && t <= s[i].depSec) {
      // dwelling: snap to shape so it lines up with the moving segment
      if (s[i].segLn) return posAlongShape(s[i].segLn, s[i].dA);
      if (i > 0 && s[i - 1].segLn) return posAlongShape(s[i - 1].segLn, s[i - 1].dB);
      return { lat: s[i].lat, lon: s[i].lon };
    }
    if (i < n - 1 && t > s[i].depSec && t < s[i + 1].arrSec) {
      const span = s[i + 1].arrSec - s[i].depSec, f = span > 0 ? (t - s[i].depSec) / span : 0;
      if (s[i].segLn) {
        const d = s[i].dA + (s[i].dB - s[i].dA) * f;
        return posAlongShape(s[i].segLn, d);
      }
      return { lat: s[i].lat + (s[i + 1].lat - s[i].lat) * f, lon: s[i].lon + (s[i + 1].lon - s[i].lon) * f };
    }
  }
  return null;
}

// 點到折線最近投影:回傳沿線里程 d 與垂距(km);缺站補登用
function projectOntoShape(ln, lat, lon) {
  ensureCum(ln);
  const sh = ln.shape, kx = Math.cos(lat * Math.PI / 180) * 111.32, ky = 111.32;
  let bestD = null, bestKm = 1e9;
  for (let i = 0; i < sh.length - 1; i++) {
    const ax = (sh[i][1] - lon) * kx, ay = (sh[i][0] - lat) * ky;
    const bx = (sh[i + 1][1] - lon) * kx, by = (sh[i + 1][0] - lat) * ky;
    const vx = bx - ax, vy = by - ay, L2 = vx * vx + vy * vy;
    const t = L2 > 0 ? Math.max(0, Math.min(1, -(ax * vx + ay * vy) / L2)) : 0;
    const px = ax + vx * t, py = ay + vy * t, km = Math.hypot(px, py);
    if (km < bestKm) { bestKm = km; bestD = ln.cum[i] + Math.sqrt(L2) * t; }
  }
  return { d: bestD, perpKm: bestKm };
}

// map each schedule stop to (line, arc-length d) so sched trains ride the real shape
function assignSchedShapePaths() {
  const lines = state.trackLines || [];
  const byName = new Map();
  lines.forEach(ln => {
    if (!ln.shape) return;
    ensureCum(ln);
    ln.stations.forEach(st => {
      if (st.d == null) return;
      if (!byName.has(st.name)) byName.set(st.name, []);
      byName.get(st.name).push({ ln, d: st.d });
    });
  });
  // 補充式投影:每個班表站名對「線站列沒登記它、但軌道實際貼站經過」的線補一筆里程。
  // 治兩類殘存直線:線站列缺站(百福/南樹林/暖暖/成功等)整段退化成弦;
  // 跨線站(成功在成追線＋山線)缺其中一線導致相鄰段配不到共同線。
  const uniq = new Map();
  for (const tr of state.trains) for (const s of tr.stops)
    if (!uniq.has(s.name)) uniq.set(s.name, s);
  for (const [name, st] of uniq) {
    const have = new Set((byName.get(name) || []).map(c => c.ln));
    for (const ln of lines) {
      if (!ln.shape || have.has(ln)) continue;
      const pr = projectOntoShape(ln, st.lat, st.lon);
      if (pr.d == null || pr.perpKm >= 0.3) continue;
      if (!byName.has(name)) byName.set(name, []);
      byName.get(name).push({ ln, d: pr.d });
    }
  }
  let onShape = 0, straight = 0;
  for (const tr of state.trains) {
    const s = tr.stops;
    for (let i = 0; i < s.length - 1; i++) {
      const A = byName.get(s[i].name), B = byName.get(s[i + 1].name);
      let best = null;
      if (A && B) for (const a of A) for (const b of B) if (a.ln === b.ln) {
        const gap = Math.abs(b.d - a.d);
        if (!best || gap < best.gap) best = { ln: a.ln, dA: a.d, dB: b.d, gap };
      }
      if (best) { s[i].segLn = best.ln; s[i].dA = best.dA; s[i].dB = best.dB; onShape++; }
      else straight++;
    }
  }
  state._segStats = { onShape, straight };
}

function recomputeTrains() {
  state.lines.forEach(ln => {
    buildLineSchedule(ln);
    ln.n = Math.max(1, Math.round(ln.period / headwayOf(ln, state.hour)));
  });
  updateCount();
}

function updateCount() {
  let n = 0;
  if (state.mode === 'sched') {
    for (const tr of state.trains) if (state.visible.has(tr.typeName) && trainPos(tr, state.simSec)) n++;
  } else {
    state.lines.forEach(ln => { if (state.visible.has(ln.id)) n += ln.n; });
  }
  document.getElementById('count').textContent = `${n} 班奔跑中`;
}

function drawFreq(w, h) {
  const P = pal();
  const z = map.getZoom();
  const showStation = z >= 13, showTrain = z >= 12;
  const inView = p => p.x >= -40 && p.x <= w + 40 && p.y >= -20 && p.y <= h + 20;
  const drawnNames = new Set();
  ctx.textAlign = 'center';
  state.lines.forEach(ln => {
    if (!state.visible.has(ln.id) || !ln.pts) return;
    const line = ln.shapePts || ln.pts;
    ctx.beginPath();
    line.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
    ctx.strokeStyle = ln.color; ctx.globalAlpha = P.railAlpha; ctx.lineWidth = 3.4; ctx.stroke();
    ctx.globalAlpha = 1;
  });
  const freqLabels = [];
  state.lines.forEach(ln => {
    if (!state.visible.has(ln.id) || !ln.pts) return;
    ln.pts.forEach((p, idx) => {
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.4, 0, 7);
      ctx.fillStyle = P.stnFill; ctx.fill();
      ctx.lineWidth = 1.5; ctx.strokeStyle = ln.color; ctx.globalAlpha = 0.9; ctx.stroke();
      ctx.globalAlpha = 1;
      if (showStation && inView(p)) freqLabels.push({ p, name: ln.stations[idx].name });
    });
  });
  const tau = state.elapsed * state.speedMult;
  state.lines.forEach(ln => {
    if (!state.visible.has(ln.id) || !ln.sched) return;
    const tc = textColorFor(ln.color);
    for (let k = 0; k < ln.n; k++) {
      const pos = posPeriodic(ln, tau + k * ln.period / ln.n);
      const cp = map.latLngToContainerPoint([pos.lat, pos.lon]);
      if (showTrain && inView(cp)) drawTag(cp, ln.abbr, ln.color, tc);
      else drawDot(cp, ln.color);
    }
  });
  // 站名最後畫,才不會被列車擋住
  ctx.textAlign = 'center';
  for (const { p, name } of freqLabels) {
    if (drawnNames.has(name)) continue;
    drawnNames.add(name); tryLabel(p.x, p.y, name);
  }
}

function drawSched(w, h) {
  const P = pal();
  const z = map.getZoom();
  const showTrain = z >= 11;
  const inView = p => p.x >= -40 && p.x <= w + 40 && p.y >= -20 && p.y <= h + 20;
  if (state.trackLines) {
    for (const ln of state.trackLines) {
      if (state.trackVisible && !state.trackVisible.has(ln.id)) continue;
      ctx.beginPath();
      if (ln.shapePts) {
        ln.shapePts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
      } else {
        ln.stations.forEach((s, i) => {
          const cp = map.latLngToContainerPoint([s.lat, s.lon]);
          i ? ctx.lineTo(cp.x, cp.y) : ctx.moveTo(cp.x, cp.y);
        });
      }
      ctx.strokeStyle = ln.color; ctx.globalAlpha = P.railAlpha; ctx.lineWidth = 3.4; ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
  // 跟隨路線高亮:全程光暈描在軌道上、車站與列車下
  if (state.followTrain && state._routePts && state._routePts.length > 1) {
    ctx.beginPath();
    for (let i = 0; i < state._routePts.length; i++) {
      const p = map.latLngToContainerPoint([state._routePts[i].lat, state._routePts[i].lon]);
      i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y);
    }
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.strokeStyle = state.followTrain.color;
    ctx.globalAlpha = 0.25; ctx.lineWidth = 10; ctx.stroke();
    ctx.globalAlpha = 0.95; ctx.lineWidth = 3.6; ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // 車站圖示(依站等分級):圖示墊在列車下、站名最後畫在最上層,遠景時小站不畫
  const labelCands = [];
  for (const st of state.schedStations) {
    const cp = map.latLngToContainerPoint([st.lat, st.lon]);
    if (!inView(cp)) continue;
    const tier = st.tier == null ? 4 : st.tier;
    if (z >= 10 || tier <= 2) drawStationIcon(cp, tier);
    labelCands.push({ cp, st, tier });
  }
  let n = 0;
  for (const tr of state.trains) {
    const isFollow = tr === state.followTrain;
    if (!isFollow && !state.visible.has(tr.typeName)) continue;
    const pos = trainPos(tr, state.simSec); if (!pos) continue;
    if (state.visible.has(tr.typeName)) n++;
    const cp = map.latLngToContainerPoint([pos.lat, pos.lon]);
    if (isFollow) { drawFollowMarker(cp, tr); state._trainHits.push({ x: cp.x, y: cp.y, tr }); continue; }
    if (!inView(cp)) continue;
    state._trainHits.push({ x: cp.x, y: cp.y, tr }); // 供點擊/hover 命中測試(每幀重建)
    if (showTrain) drawTag(cp, tr.train, tr.color, textColorFor(tr.color));
    else drawDot(cp, tr.color);
  }
  // 站名標籤:大站先取位、字級隨站等、蓋在列車上層才不會被擋
  ctx.textAlign = 'center';
  labelCands.sort((a, b) => a.tier - b.tier);
  const drawnNames = new Set();
  for (const c of labelCands) {
    const t = TIER_STYLE[c.tier];
    if (z < t.lz || drawnNames.has(c.st.name)) continue;
    drawnNames.add(c.st.name);
    tryLabel(c.cp.x, c.cp.y - Math.max(0, t.r - 2), c.st.name, t.f, c.tier <= 1 ? 4 : 3);
  }
  document.getElementById('count').textContent = `${n} 班奔跑中`;
}

function drawFollowMarker(p, tr) {
  const dw = dwellInfoOf(tr, effT(tr));
  if (dw && dw.st.stop !== false) { // 停站脈動:外圈呼吸擴散
    const ph = (performance.now() % 1600) / 1600;
    ctx.beginPath(); ctx.arc(p.x, p.y, 17 + ph * 11, 0, 7);
    ctx.strokeStyle = tr.color; ctx.globalAlpha = 0.35 * (1 - ph); ctx.lineWidth = 2; ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(p.x, p.y, 17, 0, 7);
  ctx.strokeStyle = tr.color; ctx.globalAlpha = 0.3; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(p.x, p.y, 11, 0, 7);
  ctx.strokeStyle = tr.color; ctx.globalAlpha = 0.9; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.globalAlpha = 1;
  drawTag(p, tr.train, tr.color, textColorFor(tr.color));
}

let labelBoxes = [];
function tryLabel(x, y, name, font, halo) {
  ctx.font = (font || '500 11px ') + FONT;
  const w = ctx.measureText(name).width, h = 13;
  const l = x - w / 2 - 1, r = x + w / 2 + 1, b = y - 4, t = b - h;
  for (const bx of labelBoxes) if (l < bx.r && r > bx.l && t < bx.b && b > bx.t) return;
  labelBoxes.push({ l, r, t, b });
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.lineWidth = halo || 3; ctx.strokeStyle = pal().lblStroke;
  ctx.strokeText(name, x, y - 4);
  ctx.fillStyle = pal().lbl; ctx.fillText(name, x, y - 4);
}

// ── 車站分級圖示(站等:特等/一等/二等/三等/簡易招呼) ──
// r=圖示半徑 w=框線 ring=框色 f=標籤字級 lz=標籤最低 zoom;特等畫圓角方牌
const TIER_STYLE = [
  { r: 6.5, w: 2.4, ring: '#d23c2a', f: '800 12.5px ', lz: 0,    sq: true },
  { r: 4.6, w: 2.0, ring: '#2a4a73', f: '700 12px ',   lz: 9 },
  { r: 3.6, w: 1.7, ring: '#2a4a73', f: '600 11px ',   lz: 10.5 },
  { r: 2.7, w: 1.4, ring: '#5b78a0', f: '500 11px ',   lz: 12 },
  { r: 2,   w: 1.2, ring: '#8aa0c0', f: '500 10.5px ', lz: 13 },
];
function drawStationIcon(cp, tier) {
  const t = TIER_STYLE[tier];
  if (t.sq) { // 特等站:白底圓角方牌+紅框+中心點,像站名牌
    const s = t.r, r0 = 2.5, x0 = cp.x - s, y0 = cp.y - s, ww = s * 2;
    ctx.beginPath();
    ctx.moveTo(x0 + r0, y0);
    ctx.arcTo(x0 + ww, y0, x0 + ww, y0 + ww, r0);
    ctx.arcTo(x0 + ww, y0 + ww, x0, y0 + ww, r0);
    ctx.arcTo(x0, y0 + ww, x0, y0, r0);
    ctx.arcTo(x0, y0, x0 + ww, y0, r0);
    ctx.closePath();
    ctx.fillStyle = '#fffdf6'; ctx.fill();
    ctx.lineWidth = t.w; ctx.strokeStyle = t.ring; ctx.stroke();
    ctx.beginPath(); ctx.arc(cp.x, cp.y, 1.8, 0, 7);
    ctx.fillStyle = t.ring; ctx.fill();
    return;
  }
  ctx.beginPath(); ctx.arc(cp.x, cp.y, t.r, 0, 7);
  ctx.fillStyle = tier <= 1 ? '#fffdf6' : pal().stnFill; ctx.fill();
  ctx.lineWidth = t.w; ctx.strokeStyle = t.ring;
  ctx.globalAlpha = tier >= 3 ? 0.8 : 1; ctx.stroke();
  ctx.globalAlpha = 1;
}

function drawTag(p, label, bg, fg) {
  // textAlign 必須自己設:draw() 每幀結尾重設為 start,靠環境值會讓車號從中心點往右起筆(偏右半個字寬)
  ctx.font = '700 10px ' + FONT; ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  const pw = ctx.measureText(label).width + 10, ph = 15, rx = 7.5;
  const x0 = p.x - pw / 2, y0 = p.y - ph / 2;
  ctx.beginPath();
  ctx.moveTo(x0 + rx, y0);
  ctx.arcTo(x0 + pw, y0, x0 + pw, y0 + ph, rx);
  ctx.arcTo(x0 + pw, y0 + ph, x0, y0 + ph, rx);
  ctx.arcTo(x0, y0 + ph, x0, y0, rx);
  ctx.arcTo(x0, y0, x0 + pw, y0, rx);
  ctx.closePath();
  ctx.fillStyle = bg; ctx.globalAlpha = 0.96; ctx.fill(); ctx.globalAlpha = 1;
  ctx.lineWidth = 1.5; ctx.strokeStyle = pal().tagOutline; ctx.stroke();
  ctx.fillStyle = fg; ctx.fillText(label, p.x, p.y + 0.5);
}

function drawDot(p, color) {
  ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 7);
  ctx.fillStyle = color; ctx.globalAlpha = 0.2; ctx.fill();
  ctx.beginPath(); ctx.arc(p.x, p.y, 3.2, 0, 7);
  ctx.fillStyle = '#ffffff'; ctx.globalAlpha = 0.95; ctx.fill();
  ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, 7);
  ctx.fillStyle = color; ctx.globalAlpha = 1; ctx.fill();
}

// 點擊/hover 的列車命中測試(用 drawSched 每幀重建的螢幕座標快取)
function trainAt(cp) {
  let best = null, bd = 16; // px
  for (const h of (state._trainHits || [])) {
    const d = Math.hypot(h.x - cp.x, h.y - cp.y);
    if (d < bd) { bd = d; best = h; }
  }
  return best ? { tr: best.tr, dist: bd } : null;
}

function draw() {
  if (!state.ready) return;
  const w = cv.width / state.dpr, h = cv.height / state.dpr;
  ctx.clearRect(0, 0, w, h);
  state._trainHits = [];
  labelBoxes = [];
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (state.mode === 'sched') drawSched(w, h); else drawFreq(w, h);
  ctx.globalAlpha = 1; ctx.textAlign = 'start'; ctx.textBaseline = 'alphabetic';
}

function tick(now) {
  if (!state.t0) state.t0 = now;
  const dt = (now - state.t0) / 1000; state.t0 = now;
  if (state.playing) {
    if (state.mode === 'sched') {
      state.simSec = (state.simSec + dt * state.speedMult * SCHED_K) % 86400;
      document.getElementById('tod').value = Math.floor(state.simSec / 60);
      document.getElementById('todOut').textContent = fmtHM(state.simSec);
      document.getElementById('clock').textContent = fmtHM(state.simSec);
    } else {
      state.elapsed += dt;
    }
  }
  if (state.autoTour && state.mode === 'sched' && state.playing) {
    const ftr = state.followTrain;
    if (!ftr || effT(ftr) > ftr.stops[ftr.stops.length - 1].arrSec || now >= (state._tourNext || 0))
      nextTourTrain(now);
  }
  if (state.mode === 'sched' && state.followTrain) {
    updateFollowCamera();
    state._evClock = (state._evClock || 0) + dt;
    if (state._evClock >= 0.5) { state._evClock = 0; scanFollowEvents(); }
  }
  if (state.mode === 'sched') {
    if (state.boardStation && Math.abs(state.simSec - (state.boardRenderedAt || 0)) >= 20) renderBoard();
    drawFlow();
  }
  state._skyClock = (state._skyClock || 0) + dt;
  if (state._skyClock >= 0.5) { state._skyClock = 0; updateSkyTint(); }
  state._liveClock = (state._liveClock || 0) + dt;
  if (state._liveClock >= 1) { state._liveClock = 0; updateLiveBadge(); }
  draw();
  requestAnimationFrame(tick);
}

function buildToggles() {
  const box = document.getElementById('lineToggles');
  box.innerHTML = '';
  const chip = (name, color, set, id) => {
    const el = document.createElement('div');
    el.className = 'chip' + (set.has(id) ? '' : ' off');
    el.innerHTML = `<span class="dot" style="background:${color}"></span>${name}`;
    el.onclick = () => {
      if (set.has(id)) { set.delete(id); el.classList.add('off'); }
      else { set.add(id); el.classList.remove('off'); }
      updateCount();
    };
    box.appendChild(el);
  };
  const label = txt => {
    const el = document.createElement('div'); el.className = 'legend-lbl'; el.textContent = txt;
    box.appendChild(el);
  };
  if (state.mode === 'sched') {
    label('車種（篩選列車）');
    state.types.forEach(t => chip(t.key, t.color, state.visible, t.key));
    label('鐵道路線（顯示／隱藏軌道）');

  } else {

}

function fitData(latlngs) {
  // 容器尺寸未就緒時(部分環境在 load 後才排版)fitBounds 會誤算成最大縮放,
  // 先等到 stage 有實際高度再 fit(最多重試約 1 秒)。
  const b = L.latLngBounds(latlngs);
  let tries = 0;
  const doFit = () => {
    map.invalidateSize();
    if (map.getSize().y < 20 && tries++ < 60) { requestAnimationFrame(doFit); return; }
    map.fitBounds(b, { padding: [30, 30], animate: false });
  };
  doFit();
}

function loadSystem(sys) {
  state.sysId = sys.id; state.data = sys.data; state.mode = sys.mode || 'freq';
  if (state.autoTour) setAutoTour(false); // 手動換系統即退出隨機模式
  clearFollow();
  const ts = document.getElementById('trainSearch'); if (ts) ts.value = '';
  if (state.mode === 'sched') {
    state.trains = sys.data.trains;
    const seen = new Map();
    sys.data.trains.forEach(tr => tr.stops.forEach(st => { if (!seen.has(st.name)) seen.set(st.name, { name: st.name, lat: st.lat, lon: st.lon }); }));
    state.schedStations = [...seen.values()];
    // 站等 → 圖示分級:官方站等優先(特等0/一等1/二等2/三等3/簡易招呼4),
    // 對不上的站(多為支線)以每日停靠班次數推
    const CLS_TIER = { '特等': 0, '一等': 1, '二等': 2, '三等': 3 };
    const clsMap = state.stnClassMap || {};
    const stopCount = {};
    for (const tr of state.trains)
      for (const s of tr.stops) if (s.stop !== false) stopCount[s.name] = (stopCount[s.name] || 0) + 1;
    state.schedStations.forEach(st => {
      const c = clsMap[st.name] || clsMap[st.name.replace(/台/g, '臺')];
      st.tier = c ? (CLS_TIER[c] != null ? CLS_TIER[c] : 4)
        : (n => n >= 200 ? 1 : n >= 90 ? 2 : n >= 30 ? 3 : 4)(stopCount[st.name] || 0);
    });
    state.types = sys.data.types || [];
    state.visible = new Set(state.types.map(t => t.key));
    state.trackLines = state.trackData ? state.trackData.lines : null;
    state.trackVisible = new Set((state.trackLines || []).map(l => l.id));
    state.simSec = nowSecOfDay(); // 開頁即同步現在時刻
    pollLive(); // 初始 poll 在 mode 就緒前會被擋掉,進台鐵模式時補拉
    assignSchedShapePaths();
    computeFlow();
    fitData(state.schedStations.map(s => [s.lat, s.lon]));
    reproject();
    document.getElementById('note').textContent =
      '資料來源：台鐵官方 OpenData（ods.railway.gov.tw）每日時刻表' + (sys.data.date ? '（' + sys.data.date + '）' : '') +
      '，共 ' + state.trains.length + ' 車次；即時誤點資料介接「交通部TDX平臺」（每分鐘更新，回到現在時刻自動套用）。' +
      '列車依真實時刻表運行，沿實際路線經過中途各站（少數支線區段為直線近似）。點地圖上的車站可看即將停靠的班次。';
    populateTrainList();
    document.getElementById('searchRow').hidden = false;
    document.getElementById('flowWrap').hidden = false;
  } else {
    state.speed = sys.speed;
    state.hour = Math.min(24, Math.max(5, new Date().getHours())); // 班距也跟著現在時段
    state.lines = sys.data.lines.map(l => ({ ...l, abbr: abbrOf(l) }));
    state.visible = new Set(state.lines.map(l => l.id));
    state.elapsed = 0;
    fitData(sys.data.lines.flatMap(l => l.stations.map(s => [s.lat, s.lon])));
    reproject(); recomputeTrains();
    const hasTdxSegs = sys.data.lines.some(l => l.segs);
    document.getElementById('note').textContent =
      '注意：捷運為「班距模擬」示意——發車間隔與站間時間取自官方資料，但畫面上的列車位置是推算的，並非即時班次，實際到離站時刻請以各捷運公司資訊為準。　' +
      (sys.data.source_notes ? '資料來源：' + sys.data.source_notes + '　' : '') +
      (hasTdxSegs ? '站間行駛與停站時間為 TDX 實際值，列車數＝運轉週期 ÷ 班距（依尖離峰）。'
        : '平均營運速度以 ' + state.speed + ' km/h 估算，列車數＝往返週期 ÷ 班距。');
    document.getElementById('searchRow').hidden = true;
    document.getElementById('flowWrap').hidden = true;
  }
  closeBoard();
  closeFavPanel();
  closeRidePanel();
  closeExplorePanel();
  configTimeSlider();
  buildToggles();
  renderFavs();
  renderPassport();
  refreshBadge();
  updateCount();
  const meta = SYS_META[sys.id];
  if (meta) {
    document.getElementById('plateL').textContent = meta.plateL;
    document.getElementById('plateR').textContent = meta.plateR;
    document.getElementById('plateSub').textContent = meta.sub;
    document.getElementById('lead').textContent = meta.lead;
  }
  document.querySelectorAll('#systems button').forEach(b =>
    b.classList.toggle('active', b.dataset.id === sys.id));
}

function populateTrainList() {
  const dl = document.getElementById('trainList'); dl.innerHTML = '';
  const trains = [...state.trains].sort((a, b) =>
    ('' + a.train).localeCompare('' + b.train, 'en', { numeric: true }));
  const frag = document.createDocumentFragment();
  for (const tr of trains) {
    const o = document.createElement('option');
    const a = tr.stops[0].name, b = tr.stops[tr.stops.length - 1].name;
    const spd = specialOf(tr);
    const sp = (spd && spd.named) || SPECIAL_TRAINS[String(tr.train)];
    o.value = tr.train;
    o.label = `${tr.train}　${sp ? sp.name + '・' : ''}${tr.typeName}　${a}→${b}`;
    frag.appendChild(o);
  }
  dl.appendChild(frag);
}

function findTrain(q) {
  q = (q || '').trim(); if (!q) return null;
  const num = q.split(/[\s　]/)[0];
  return state.trains.find(t => ('' + t.train) === num)
    || state.trains.find(t => ('' + t.train) === q) || null;
}

// 跨午夜車次的有效模擬時間:00:00 後仍在跑的前一日班次,把 simSec 加一天來比對
function effT(tr) {
  const s = tr.stops;
  return (state.simSec < s[0].arrSec && state.simSec + 86400 <= s[s.length - 1].depSec)
    ? state.simSec + 86400 : state.simSec;
}

// 跟隨時把播放/速度控制列移到地圖下第一排(資訊卡上方),取消跟隨移回原位
function placeControls(following) {
  const c = document.querySelector('.controls');
  const tc = document.getElementById('trainCard');
  if (following) {
    if (tc.parentElement.classList.contains('follow-panel')) return; // fs 合併卡中,控制列由 fs CSS 固定定位
    tc.before(c);
  } else document.querySelector('.kbd-hint').before(c);
}

// 全畫面跟隨:資訊卡搬進左下跟隨面板合併成一張;退出全畫面/取消跟隨還原到地圖下方
function placeTrainCard() {
  const tc = document.getElementById('trainCard');
  if (document.body.classList.contains('fs') && state.followTrain) {
    document.getElementById('followPanel').appendChild(tc);
  } else if (tc.parentElement.classList.contains('follow-panel')) {
    document.querySelector('.stage').after(tc); // 還原到主欄地圖正下方(最愛列已移側欄,不能當錨點)
    if (state.followTrain) placeControls(true); // 回一般版面:控制列在卡上方
  }
}

function setFollow(tr, isAuto, noJump) {
  if (!tr) return;
  if (!isAuto && state.autoTour) setAutoTour(false); // 使用者手動選車即接手,退出隨機模式
  closeBoard(); // 不管從哪裡選到車(看板列/地圖點車/搜尋/最愛),車站看板一律收掉
  state.followTrain = tr; state.followId = tr.train;
  // 深連結帶模擬時間:對方打開時車在同一位置
  try { history.replaceState(null, '', '?train=' + encodeURIComponent(tr.train) + '&t=' + fmtHM(state.simSec)); } catch (e) {}
  const first = tr.stops[0], last = tr.stops[tr.stops.length - 1];
  if (effT(tr) < first.depSec - 60 || effT(tr) > last.arrSec) {
    state.simSec = Math.max(0, first.depSec - 20) % 86400;
    syncTimeUI();
  }
  if (!noJump) {
    const pos = trainPos(tr, state.simSec) || { lat: first.lat, lon: first.lon };
    map.setView([pos.lat, pos.lon], Math.max(map.getZoom(), 13), { animate: false });
  }
  state.followStatus = null; renderFollowBar();
  state.followEvents = []; state._evSeen = {};
  state._routePts = buildFollowRoute(tr);
  showFollowPanel(tr);
  placeTrainCard();
  placeControls(true);
  (state._placeFsOverlays || (() => {}))(document.body.classList.contains('fs'));
  updateCount();
}

function clearFollow() {
  state.followTrain = null; state.followId = null; state.followStatus = null;
  state._routePts = null;
  state._plateStop = null;
  const dp = document.getElementById('dwellPlate'); if (dp) dp.classList.remove('show');
  try { history.replaceState(null, '', location.pathname); } catch (e) {}
  const fb = document.getElementById('followBar');
  if (fb) { fb.hidden = true; fb.className = 'followbar'; fb.innerHTML = ''; }
  document.getElementById('followPanel').hidden = true;
  document.getElementById('trainCard').hidden = true;
  placeTrainCard(); // followTrain 已清空 → 還原資訊卡到地圖下方
  placeControls(false);
  (state._placeFsOverlays || (() => {}))(document.body.classList.contains('fs'));
}

// 特別列車檔案(data/tra_special_trains.json)比對:車次號→具名列車、carName→車型、停站→支線。
// 結果快取在車上;檔案缺失時回傳 null,呼叫端退回內建簡版(SPECIAL_TRAINS/KIND_RULES)
function specialOf(tr) {
  if (tr._sp !== undefined) return tr._sp;
  const sd = state.special;
  if (!sd) return (tr._sp = null);
  const no = String(tr.train);
  const named = sd.namedTrains.find(n => n.trainNos.includes(no)) || null;
  const stock = sd.rollingStock.find(r => r.carNames.includes(tr.carName)) || null;
  const branch = sd.branchLines.find(b => tr.stops.some(s => b._set.has(s.name))) || null;
  return (tr._sp = { named, stock, branch });
}
function trainIntro(tr) {
  const cn = tr.carName || '';
  const spd = specialOf(tr);
  const sp = (spd && spd.named && { name: spd.named.name, desc: spd.named.story })
    || SPECIAL_TRAINS[String(tr.train)] || null;
  let kind = null, desc = null, fact = null;
  if (spd && spd.stock) {
    kind = spd.stock.name; desc = spd.stock.story;
    const fs = spd.stock.facts || [];
    if (fs.length) fact = fs[(parseInt(tr.train, 10) || 0) % fs.length]; // 依車次號取,同車次每次看到同一則
  } else {
    for (const [re, k, d] of KIND_RULES) if (re.test(cn)) { kind = k; desc = d; break; }
    if (!desc) desc = TYPE_DESC[tr.typeName] || null;
  }
  const branch = spd ? spd.branch : null;
  const amens = [];
  const par = (cn.match(/\(([^)]*)\)/) || [])[1] || '';
  for (const [flag, label] of AMEN_FLAGS) if (par.includes(flag)) amens.push(label);
  const stops = tr.stops.filter(s => s.stop !== false);
  const durSec = tr.stops[tr.stops.length - 1].arrSec - tr.stops[0].depSec;
  const dur = durSec >= 3600
    ? Math.floor(durSec / 3600) + ' 小時 ' + Math.round(durSec % 3600 / 60) + ' 分'
    : Math.round(durSec / 60) + ' 分';
  return { special: sp || null, kind, desc: sp ? sp.desc : desc, amens, nStops: stops.length, dur, fact, branch };
}
// ── 隨機跟隨(螢幕保護模式):加權挑一班正在跑的車,跟 1–2 分鐘換下一班 ──
const TOUR_W = { '其他': 24, '莒光/復興': 10, '自強': 5, '區間快': 2, '區間車': 1 };
function pickTourTrain() {
  const cands = state.trains.filter(t =>
    t !== state.followTrain && state.visible.has(t.typeName) && trainPos(t, state.simSec));
  if (!cands.length) return null;
  let total = 0;
  const ws = cands.map(t => {
    let w = TOUR_W[t.typeName] || 1;
    const sp = specialOf(t); // 具名觀光列車與稀有車種加權,放空/隨機模式更常遇到
    if (sp && (sp.named || (sp.stock && sp.stock.rarity === '稀有'))) w *= 4;
    total += w; return w;
  });
  let r = Math.random() * total;
  for (let i = 0; i < cands.length; i++) { r -= ws[i]; if (r <= 0) return cands[i]; }
  return cands[cands.length - 1];
}
function nextTourTrain(now) {
  const tr = pickTourTrain();
  state._tourNext = (now || performance.now()) + (tr ? 60000 + Math.random() * 60000 : 5000);
  if (!tr) {
    // 深夜幾乎沒車 → 重播傍晚尖峰(模擬時鐘本來就支援任意時間)
    if (state.ambient && !state.nightReplay) { state.nightReplay = true; setSimSec(18 * 3600); refreshBadge(); }
    return;
  }
  const ts = document.getElementById('trainSearch'); if (ts) ts.value = tr.train;
  if (!state.ambient) { setFollow(tr, true); return; }
  if (state._ambientFresh) { state._ambientFresh = false; ambientJumpTo(tr); }
  else fadeSwitch(tr);
}
// 放空模式鏡頭直接貼車(進場與換車落點共用)
const AMBIENT_Z = 14;
function ambientJumpTo(tr) {
  setFollow(tr, true, true);
  const p = trainPos(tr, state.simSec) || tr.stops[0];
  map.setView([p.lat, p.lon], AMBIENT_Z, { animate: false });
}
// 放空模式換車:淡出 → 直接切到下一班 → 淡入(不拉高俯瞰)
function fadeSwitch(tr) {
  const veil = document.getElementById('veil');
  state._transition = true;
  state._tourNext += 1600; // 轉場 ~1.6s 不計入跟隨時間
  veil.style.opacity = 1;
  setTimeout(() => {
    if (!state.autoTour) { veil.style.opacity = 0; state._transition = false; return; }
    ambientJumpTo(tr);
    veil.style.opacity = 0;
    setTimeout(() => { state._transition = false; }, 750);
  }, 800);
}
function setAutoTour(on) {
  if (on && state.mode !== 'sched') {
    const s = state.systems.find(x => x.mode === 'sched');
    if (!s) return;
    loadSystem(s);
  }
  state.autoTour = on;
  document.getElementById('tourBtn').classList.toggle('active', on);
  if (on) {
    if (!state.playing) togglePlay();
    nextTourTrain();
  }
}

// 放空模式日夜天色:模擬時刻在天色停靠點間內插(深夜藍→黎明橘→白晝透明→黃昏金→暮色紫→夜)
const SKY_STOPS = [ // [小時, r, g, b, alpha]
  [0,    14, 24, 48, .34],
  [5,    14, 24, 48, .34],
  [6.5, 255, 176, 110, .12],
  [8,     0, 0, 0, 0],
  [16,    0, 0, 0, 0],
  [17.5, 255, 170, 90, .13],
  [18.8,  84, 58, 110, .22],
  [20,   14, 24, 48, .34],
  [24,   14, 24, 48, .34],
];
function updateSkyTint() {
  const el = document.getElementById('skyTint');
  if (!state.ambient || state.mode !== 'sched') {
    if (el._on) { el.style.background = ''; el._on = false; }
    return;
  }
  const h = state.simSec / 3600;
  let a = SKY_STOPS[0], b = SKY_STOPS[SKY_STOPS.length - 1];
  for (let i = 0; i < SKY_STOPS.length - 1; i++)
    if (h >= SKY_STOPS[i][0] && h <= SKY_STOPS[i + 1][0]) { a = SKY_STOPS[i]; b = SKY_STOPS[i + 1]; break; }
  const f = (h - a[0]) / ((b[0] - a[0]) || 1);
  const L = i => a[i] + (b[i] - a[i]) * f;
  el.style.background = `rgba(${L(1) | 0},${L(2) | 0},${L(3) | 0},${L(4).toFixed(3)})`;
  el._on = true;
}

// ── 放空模式(ambient):全畫面+自動導演+閒置隱藏 UI+防休眠+背景音樂 ──
async function acquireWakeLock() {
  try { state._wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}
function releaseWakeLock() {
  try { state._wakeLock && state._wakeLock.release(); } catch (e) {}
  state._wakeLock = null;
}
document.addEventListener('visibilitychange', () => {
  if (state.ambient && document.visibilityState === 'visible') acquireWakeLock();
});

// 閒置 5 秒淡出控制列,滑鼠/按鍵/觸碰喚回
function ambientIdleReset() {
  document.body.classList.remove('idle');
  clearTimeout(state._idleT);
  if (state.ambient) state._idleT = setTimeout(() => document.body.classList.add('idle'), 5000);
}
['mousemove', 'pointerdown', 'keydown', 'touchstart'].forEach(ev =>
  document.addEventListener(ev, () => { if (state.ambient) ambientIdleReset(); }, { passive: true }));

function setAmbient(on) {
  if (on === !!state.ambient) return;
  state.ambient = on;
  const b = document.getElementById('ambientBtn');
  if (on) {
    if (state.mode !== 'sched') {
      const s = state.systems.find(x => x.mode === 'sched');
      if (!s) { state.ambient = false; return; }
      loadSystem(s);
    }
    b.textContent = '離開放空';
    // 深夜(00–05)車太少 → 直接重播傍晚尖峰
    if (state.simSec < 5 * 3600) { state.nightReplay = true; setSimSec(18 * 3600); refreshBadge(); }
    if (!document.body.classList.contains('fs')) (state._setFs || (() => {}))(true);
    if (!state.playing) togglePlay();
    state._preAmbSpd = state.speedMult;
    setSpeed(5); // 放空模式看單車,5× 節奏剛好
    state._ambientFresh = true; // 第一班直接跳到車,不走淡出淡入
    setAutoTour(true);
    setSparkOpen(false); setStopsOpen(false); // 放空預設收乾淨,中間留給地圖
    closeExplorePanel(); // 亮點面板也收,資訊只留左下合併卡
    acquireWakeLock();
    ambientIdleReset();
    if (state.music && state.music.enabled && state.music.audio.paused) musicPlay(); // 已在放就別重來
  } else {
    b.textContent = '🌙 放空模式';
    releaseWakeLock();
    // 音樂跟著開關走,離開放空不強制停(要停就按 🔇)
    clearTimeout(state._idleT);
    document.body.classList.remove('idle');
    state._transition = false;
    document.getElementById('veil').style.opacity = 0;
    updateSkyTint(); // ambient 已關,立即清天色
    if (state.speedMult === 5 && state._preAmbSpd) setSpeed(state._preAmbSpd);
    if (state.nightReplay) { state.nightReplay = false; refreshBadge(); }
    if (state.autoTour) setAutoTour(false);
    setSparkOpen(true); // 回一般模式:曲線預設展開(時刻表維持收起)
    if (document.body.classList.contains('fs')) (state._setFs || (() => {}))(false);
  }
}

// ── 放空模式背景音樂(suno musics/;開關+音量,隨機循環,進出放空淡入淡出) ──
const MUSIC_DIR = 'suno musics/';
const MUSIC_FILES = [
  'City Lights Whisper-2.mp3', 'City Lights Whisper.mp3',
  'City Lights, Fading Nights-2.mp3', 'City Lights, Fading Nights.mp3',
  'City Rain Reverie.mp3', 'Drifting Among Stars.mp3',
  'Floating in Zero Gravity (Extend).mp3', 'Floating in Zero Gravity.mp3',
  'Inspired by peaceful piano-2.mp3', 'Inspired by peaceful piano-3.mp3',
  'Inspired by peaceful piano-4.mp3', 'Inspired by peaceful piano-5.mp3',
  'Inspired by peaceful piano-6.mp3', 'Inspired by peaceful piano.mp3',
  'Midnight Reverie.mp3', 'Midnight Whispers.mp3', 'Neon Glow.mp3',
  'Neon Reverie-2.mp3', 'Neon Reverie-3.mp3', 'Neon Reverie.mp3',
  'Neon Tide In Slow Motion.mp3', 'Untitled-2.mp3', 'Untitled-3.mp3',
  'Untitled-4.mp3', 'Untitled-5.mp3', 'Untitled-6.mp3', 'Untitled-7.mp3',
  'Untitled.mp3', 'Urban Night.mp3',
];
function musicShuffle(a) { // Fisher-Yates 洗牌
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function loadMusicPref() {
  let enabled = true, vol = 0.5;
  try {
    const o = JSON.parse(localStorage.getItem('trainmap-music') || '{}');
    if (o.enabled === false) enabled = false;
    if (typeof o.vol === 'number') vol = Math.max(0, Math.min(1, o.vol));
  } catch (e) {}
  return { enabled, vol };
}
function saveMusicPref() {
  try { localStorage.setItem('trainmap-music', JSON.stringify({ enabled: state.music.enabled, vol: state.music.vol })); } catch (e) {}
}
function initMusic() {
  const pref = loadMusicPref();
  const audio = new Audio();
  audio.preload = 'none';
  audio.volume = 0;
  state.music = { enabled: pref.enabled, vol: pref.vol, audio, list: musicShuffle(MUSIC_FILES.slice()), idx: 0, _fade: null, _fails: 0 };
  audio.addEventListener('ended', musicNext);
  audio.addEventListener('playing', () => { state.music._fails = 0; }); // 有一首放起來就歸零
  audio.addEventListener('error', () => { // 壞檔跳下一首;整份清單都載不到(如部署環境無音檔)就停,不空轉
    const m = state.music;
    if (!m.enabled) return;
    if (++m._fails >= m.list.length) return;
    musicNext();
  });
  const vs = document.getElementById('musicVol');
  vs.value = Math.round(pref.vol * 100);
  vs.oninput = e => {
    const v = (+e.target.value) / 100;
    state.music.vol = v;
    clearInterval(state.music._fade);
    audio.volume = v;
    saveMusicPref();
  };
  // 沒在放就開播(含「開關亮著但還沒播」的首次載入態),在放就停
  document.getElementById('musicBtn').onclick = () =>
    setMusicEnabled(state.music.audio.paused ? true : !state.music.enabled);
  updateMusicBtn();
}
function updateMusicBtn() {
  const b = document.getElementById('musicBtn');
  if (!b) return;
  b.textContent = state.music.enabled ? '🎵 音樂' : '🔇 音樂';
  b.classList.toggle('on', state.music.enabled);
}
function musicLoadCur() {
  const m = state.music;
  m.audio.src = encodeURI(MUSIC_DIR + m.list[m.idx]);
}
function musicNext() {
  const m = state.music;
  m.idx++;
  if (m.idx >= m.list.length) { musicShuffle(m.list); m.idx = 0; } // 一輪播完重洗
  musicLoadCur();
  if (m.enabled) { m.audio.volume = m.vol; m.audio.play().catch(() => {}); }
}
function musicRamp(to, ms, thenPause) { // 音量漸變(50ms 一階)
  const a = state.music.audio;
  clearInterval(state.music._fade);
  const from = a.volume, steps = Math.max(1, Math.round(ms / 50));
  let i = 0;
  state.music._fade = setInterval(() => {
    i++;
    a.volume = Math.max(0, Math.min(1, from + (to - from) * i / steps));
    if (i >= steps) { clearInterval(state.music._fade); if (thenPause) a.pause(); }
  }, 50);
}
function musicPlay() {
  const m = state.music;
  if (!m.audio.src) musicLoadCur();
  m.audio.volume = 0;
  m.audio.play().then(() => musicRamp(m.vol, 1200)).catch(() => {}); // 自動播放被擋就靜默略過
}
function musicStop() { musicRamp(0, 800, true); }
function setMusicEnabled(on) {
  state.music.enabled = on;
  saveMusicPref();
  updateMusicBtn();
  on ? musicPlay() : musicStop(); // 開關即播/停,放空與否都一樣
}

// ── 最愛列車(localStorage) ──
function loadFavs() { try { return JSON.parse(localStorage.getItem('trainmap-favs') || '[]'); } catch (e) { return []; } }
function saveFavs(f) { try { localStorage.setItem('trainmap-favs', JSON.stringify(f)); } catch (e) {} }
function isFav(no) { return loadFavs().some(f => f.train === String(no)); }
function updateStar() {
  const b = document.getElementById('tcStar'), tr = state.followTrain;
  if (!tr) return;
  const on = isFav(tr.train);
  b.textContent = on ? '★' : '☆';
  b.title = on ? '移除最愛' : '加入最愛';

function toggleFav(tr) {
  if (!tr) return;
  const no = String(tr.train);
  let favs = loadFavs();
  if (favs.some(f => f.train === no)) favs = favs.filter(f => f.train !== no);

  }
  saveFavs(favs); renderFavs(); renderFavPanel(); updateStar();

// 跟隨指定車次;在捷運頁會先切回台鐵
function followTrainNo(no) {

function renderFavs() {

// ── 旅程收集(完乘記錄,localStorage;參考日本「乗りつぶし」收集文化) ──
// 手動跟隨(非放空/隨機)一路看到抵達終點=完乘一趟;同日同車次只記一次
function loadRides() { try { return JSON.parse(localStorage.getItem('trainmap-rides') || '[]'); } catch (e) { return []; } }
function saveRides(r) { try { localStorage.setItem('trainmap-rides', JSON.stringify(r)); } catch (e) {} }
function recordRide(tr) {
  if (state.autoTour) return; // 掛機自動跑完不算,親自跟完才蓋章
  const today = new Date().toLocaleDateString('sv');
  const rides = loadRides();
  if (rides.some(r => r.train === tr.train && r.date === today)) return;
  const it = trainIntro(tr), s = tr.stops;
  journeyProgress(tr, 0); // 確保 _totalKm 已算
  const spd = specialOf(tr) || {}; // 圖鑑收集用的比對 id(undefined 會被 JSON 丟掉,舊記錄以名稱字串補配)
  const prevColl = collectionOf(rides), prevAch = unlockedAchievements(rides); // push 前快照,差分找新蓋的章
  rides.push({
    train: tr.train,
    kind: (it.special && it.special.name) || it.kind || tr.typeName,
    from: s[0].name, to: s[s.length - 1].name,
    km: Math.round(tr._totalKm || 0), date: today,
    dep: s[0].depSec, stops: it.nStops, // 成就判定用(早鳥/夜行者/站站是風景)
    stockId: spd.stock ? spd.stock.id : undefined,
    namedId: spd.named ? spd.named.id : undefined,
    // 一趟可能跨多條支線(如平溪線直通深澳線),全部記下才能各蓋各的章
    branchIds: state.special
      ? (ids => ids.length ? ids : undefined)(
          state.special.branchLines.filter(b => tr.stops.some(x => b._set.has(x.name))).map(b => b.id))
      : undefined,
  });
  saveRides(rides);
  pushFollowEvent('ride:' + tr.train, '🎫 完乘達成！已記入旅程收集', true);
  renderRidePanel();
  renderPassport();
  announceCollections(tr, rides, prevColl, prevAch);
}
function renderRidePanel() {
  const el = document.getElementById('ridePanel');
  if (el.hidden) return;
  const rides = loadRides();
  const totalKm = rides.reduce((a, r) => a + (r.km || 0), 0);
  const kinds = [...new Set(rides.map(r => r.kind))];
  el.innerHTML = `<button class="close" id="rideClose">×</button>` +
    `<h3>旅程收集</h3><div class="sub">手動跟隨一班車到終點，就蓋一枚完乘章</div>` +
    (rides.length

// 完乘記錄 → 三本圖鑑的收集狀態(id 集合);護照渲染與成就判定共用同一份邏輯
function collectionOf(rides) {
  const sd = state.special;
  const named = new Set(), stock = new Set(), branch = new Set();
  if (sd) {
    sd.namedTrains.forEach(n => {
      if (n.trainNos.length && rides.some(r => r.namedId === n.id || r.kind === n.name)) named.add(n.id);
    });
    sd.rollingStock.forEach(s => {
      if (rides.some(r => r.stockId === s.id || r.kind === s.name)) stock.add(s.id);
    });
    sd.branchLines.forEach(b => {
      if (rides.some(r => (r.branchIds || (r.branchId ? [r.branchId] : [])).includes(b.id))) branch.add(b.id);
    });
  }
