// ── 今日亮點(探索面板):今日之最+特別列車+支線,新手入口;點列跟隨 ──
function computeHighlights() {
  const out = { best: [], special: [], branches: [] };
  let far = null, long = null, most = null, fast = null;
  for (const tr of state.trains) {
    journeyProgress(tr, 0); // 確保 _totalKm 已快取
    const km = tr._totalKm || 0;
    const dur = tr.stops[tr.stops.length - 1].arrSec - tr.stops[0].depSec;
    const n = tr.stops.filter(s => s.stop !== false).length;
    const v = dur > 0 ? km / dur * 3600 : 0;
    if (!far || km > far.v) far = { tr, v: km };
    if (!long || dur > long.v) long = { tr, v: dur };
    if (!most || n > most.v) most = { tr, v: n };
    if (km >= 50 && (!fast || v > fast.v)) fast = { tr, v }; // 短程沒有平均速度代表性
  }
  const used = new Set();
  const add = (h, title, sub) => {
    if (!h || used.has(h.tr)) return; // 同一班車蟬聯多冠只列最前面的頭銜
    used.add(h.tr);
    out.best.push({ tr: h.tr, title, sub: sub(h.v) });
  };
  add(far, '🏁 今日最長征', v => Math.round(v) + ' km');
  add(long, '⏳ 開最久', v => Math.floor(v / 3600) + ' 小時 ' + Math.round(v % 3600 / 60) + ' 分');
  add(most, '🛑 停最多站', v => v + ' 站');
  add(fast, '⚡ 平均最快', v => '約 ' + Math.round(v) + ' km/h');
  const sd = state.special;
  if (sd) {
    for (const nt of sd.namedTrains) for (const no of nt.trainNos) {
      const tr = state.trains.find(t => String(t.train) === no);
      if (tr) out.special.push({ tr, title: '★ ' + nt.name, sub: (nt.tags || [])[0] || '' });
    }
    // 稀有車種各挑一班代表:行駛中優先,其次最近一班未發車
    const pickRep = cands =>
      cands.find(t => trainPos(t, state.simSec))
      || cands.filter(t => t.stops[0].depSec > state.simSec).sort((a, b) => a.stops[0].depSec - b.stops[0].depSec)[0]
      || cands[0];
    for (const r of sd.rollingStock) {
      if (r.rarity !== '稀有') continue;
      const cands = state.trains.filter(t => r.carNames.includes(t.carName) && !out.special.some(x => x.tr === t));
      if (cands.length) out.special.push({ tr: pickRep(cands), title: r.name, sub: '今日 ' + cands.length + ' 班' });
    }
    for (const b of sd.branchLines) {
      const cands = state.trains.filter(t => t.stops.some(s => b._set.has(s.name)));
      if (cands.length) out.branches.push({ tr: pickRep(cands), title: b.name, sub: b.section });
    }
  }
  return out;
}

// ── 跟隨動態事件(停靠/交會/待避) ──
function dwellInfoOf(tr, t) {
  t -= liveDelaySec(tr);
  const s = tr.stops;
  for (let i = 0; i < s.length; i++)
    if (t >= s[i].arrSec && t < s[i].depSec)
      return { st: s[i], i, remain: s[i].depSec - t, total: s[i].depSec - s[i].arrSec };
  return null;
}
function pushFollowEvent(key, msg, once) {
  const now = state.simSec;
  state._evSeen = state._evSeen || {};
  const last = state._evSeen[key];
  if (last != null && (once || ((now - last + 86400) % 86400) < 900)) return; // 同事件 15 分鐘內不重複;once 則整趟只記一次
  state._evSeen[key] = now;
  (state.followEvents = state.followEvents || []).push({ tm: fmtHM(now), msg });
  if (state.followEvents.length > 6) state.followEvents.shift();
  renderFollowEvents();
}
function renderFollowEvents() {
  const el = document.getElementById('tcEvents');
  const evs = state.followEvents || [];
  el.innerHTML = evs.length
    ? evs.slice(-6).map(e =>
        `<div class="tc-ev"><span class="tt">${e.tm}</span><span>${e.msg}</span></div>`).join('')
    : '<div class="tc-empty">列車跑起來就會記錄——停靠、交會、待避……</div>';
  el.scrollTop = el.scrollHeight; // 固定高度容器,永遠捲到最新一條
}
// 每 ~0.5s 掃一次:進站停靠、與對向車交會、停站時被同向車通過(待避)
function scanFollowEvents() {
  const tr = state.followTrain;
  if (!tr || state.mode !== 'sched') return;
  const t = state.simSec;
  const myP = trainPos(tr, t); if (!myP) return;
  const dw = dwellInfoOf(tr, effT(tr));
  if (dw && dw.st.stop !== false && dw.total >= 20) {
    pushFollowEvent('dwell:' + dw.i,
      dw.total >= 180 ? `停靠 ${dw.st.name}（長時間停車——待避或調度）` : `停靠 ${dw.st.name}`, true);
  }
  // 本車行進方向:停站時取「開車後 30 秒」的方向,行進中取「現在→30 秒後」
  const myQ = trainPos(tr, dw ? dw.st.depSec + 30 : t + 30) || myP;
  const mvx = myQ.lon - myP.lon, mvy = myQ.lat - myP.lat;
  const myMoving = !dw && Math.hypot(mvx, mvy) > 1e-7;
  for (const o of state.trains) {
    if (o === tr) continue;
    const p = trainPos(o, t); if (!p) continue;
    if (Math.abs(p.lat - myP.lat) > 0.006 || Math.abs(p.lon - myP.lon) > 0.006) continue; // 粗篩 ~600m
    if (haversineKm(myP, p) > 0.45) continue;
    const q = trainPos(o, t + 30) || p;
    const ovx = q.lon - p.lon, ovy = q.lat - p.lat;
    if (Math.hypot(ovx, ovy) < 1e-7) continue; // 對方也停著(同站停靠),不記
    const dot = mvx * ovx + mvy * ovy;
    if (dw && dot > 0) pushFollowEvent('pass:' + o.train, `${o.typeName} ${o.train} 通過——本列車待避禮讓`);
    else if (dot < 0) pushFollowEvent('meet:' + o.train, `與${o.typeName} ${o.train} 交會`);
    else if (myMoving && dot > 0) { /* 同向併行,不記避免雜訊 */ }
  }
}

// 全程速度曲線(FR24 式):整趟取樣一次快取在車上,當前時刻畫紅色游標
function speedProfile(tr) {
  if (tr._spdProf) return tr._spdProf;
  const s = tr.stops, t0 = s[0].depSec, t1 = s[s.length - 1].arrSec, N = 140;
  const v = [];
  for (let i = 0; i < N; i++) {
    const t = t0 + (t1 - t0) * i / (N - 1);
    const a = trainPos(tr, t), b = trainPos(tr, Math.min(t + 30, t1));
    v.push(a && b ? haversineKm(a, b) / 30 * 3600 : 0);
  }
  return (tr._spdProf = { v, t0, t1, max: Math.max(60, Math.ceil(Math.max(...v) / 20) * 20) });
}
function drawSpark(tr, t) {
  const el = document.getElementById('tcSpark');
  const w = el.clientWidth, h = el.clientHeight;
  if (!w) return;
  const dpr = window.devicePixelRatio || 1;
  if (el.width !== Math.round(w * dpr)) { el.width = Math.round(w * dpr); el.height = Math.round(h * dpr); }
  const c = el.getContext('2d');
  c.setTransform(dpr, 0, 0, dpr, 0, 0);
  c.clearRect(0, 0, w, h);
  const { v, t0, t1, max } = speedProfile(tr);
  const X = i => i / (v.length - 1) * w, Y = kmh => h - 1 - kmh / max * (h - 10);
  c.beginPath(); c.moveTo(0, h - 1);
  v.forEach((kmh, i) => c.lineTo(X(i), Y(kmh)));
  c.lineTo(w, h - 1); c.closePath();
  c.fillStyle = 'rgba(42,74,115,.16)'; c.fill();
  c.beginPath();
  v.forEach((kmh, i) => i ? c.lineTo(X(i), Y(kmh)) : c.moveTo(X(i), Y(kmh)));
  c.strokeStyle = '#2a4a73'; c.lineWidth = 1.4; c.lineJoin = 'round'; c.stroke();
  if (t >= t0 && t <= t1) { // 當前時刻游標
    const x = (t - t0) / (t1 - t0) * w;
    c.beginPath(); c.moveTo(x, 2); c.lineTo(x, h - 1);
    c.strokeStyle = '#d23c2a'; c.lineWidth = 1.3; c.stroke();
    const kmhNow = v[Math.round((t - t0) / (t1 - t0) * (v.length - 1))] || 0;
    c.beginPath(); c.arc(x, Y(kmhNow), 2.6, 0, 7);
    c.fillStyle = '#d23c2a'; c.fill();
  }
  // 軸標最後畫+halo,游標經過時仍可讀
  c.font = '600 9px ' + FONT; c.textAlign = 'left'; c.textBaseline = 'top';
  c.lineWidth = 3; c.strokeStyle = '#fffdf6'; c.strokeText(max + ' km/h', 3, 1);
  c.fillStyle = '#a89468'; c.fillText(max + ' km/h', 3, 1);
}

// 旅程進度:沿途各段里程(貼軌段用弧長、直線段用大圓距)累計,快取在車上
function journeyProgress(tr, t) {
  t -= liveDelaySec(tr);
  const s = tr.stops;
  if (!tr._segKm) {
    tr._segKm = []; tr._totalKm = 0;
    for (let i = 0; i < s.length - 1; i++) {
      const km = s[i].segLn ? Math.abs(s[i].dB - s[i].dA) : haversineKm(s[i], s[i + 1]);
      tr._segKm.push(km); tr._totalKm += km;
    }
  }
  let done = 0;
  for (let i = 0; i < s.length - 1; i++) {
    if (t >= s[i + 1].arrSec) { done += tr._segKm[i]; continue; }
    if (t > s[i].depSec) {
      const span = s[i + 1].arrSec - s[i].depSec;
      done += span > 0 ? (t - s[i].depSec) / span * tr._segKm[i] : 0;
    }
    break;
  }
  return { done, total: tr._totalKm };
}

// ── 跟隨小面板(地圖左下角) ──
function nextStopInfo(tr, t) {
  t -= liveDelaySec(tr);
  const s = tr.stops;
  for (let i = 0; i < s.length; i++) {
    if (s[i].stop === false) continue;          // 略過通過不停的站
    if (s[i].arrSec > t) return { name: s[i].name, at: s[i].arrSec % 86400, min: (s[i].arrSec - t) / 60 };
  }
  return null;
}
function showFollowPanel(tr) {

    `${first.name} → ${last.name} · 終點 ${fmtHM(last.arrSec % 86400)} 抵達`;

}
function updateFollowPanel(tr) {
  const fp = document.getElementById('followPanel');
  if (fp.hidden || !tr) return;
  const nx = document.getElementById('fpNext'), eta = document.getElementById('fpEta');
  const dlMin = Math.round(liveDelaySec(tr) / 60);
  const info = nextStopInfo(tr, effT(tr));
  if (info) {
    nx.textContent = info.name;
    const mm = Math.round(info.min);
    // info.at 是表定時刻;有誤點時顯示估計實際時刻
    eta.innerHTML = (mm < 1 ? '即將進站' : `${fmtHM((info.at + dlMin * 60) % 86400)} · <b>${mm} 分</b>`) +
      (dlMin > 0 ? ` <span class="lateTag">誤點 ${dlMin} 分</span>` : '');
  } else {
    nx.textContent = '—'; eta.textContent = '已抵達終點';
  }
  // 停靠倒數(通過不停的站不顯示)
  const stEl = document.getElementById('fpStatus');
  const dw = dwellInfoOf(tr, effT(tr));
  const dwelling = dw && dw.st.stop !== false && dw.remain > 3 && dw.total >= 20;
  // 狀態列常駐(行進中↔停靠倒數),跟隨面板高度不因停站跳動
  if (dwelling) {
    const mm = Math.floor(dw.remain / 60), ss = Math.round(dw.remain % 60);
    stEl.textContent = `⏸ 停靠 ${dw.st.name} · ${mm > 0 ? mm + ' 分 ' : ''}${ss} 秒後開車` +
      (dw.total >= 180 ? '（待避／調度長停）' : '');
    stEl.classList.remove('run');
  } else {
    stEl.textContent = '▶ 行進中';
    stEl.classList.add('run');
  }
  stEl.hidden = false;
  // 停靠站名牌:進站淡入、開車淡出;左右鄰站取實際相鄰站(含通過站)
  const plate = document.getElementById('dwellPlate');
  if (dwelling) {
    if (state._plateStop !== dw.st) {
      state._plateStop = dw.st;
      const prev = tr.stops[dw.i - 1], next = tr.stops[dw.i + 1];
      journeyProgress(tr, 0); // 確保 _segKm 站間里程已快取
      const fmtKm = k => (k >= 9.95 ? Math.round(k) : k.toFixed(1)) + ' km';
      document.getElementById('dpName').textContent = dw.st.name;
      document.getElementById('dpPrev').textContent = prev ? prev.name : '';
      document.getElementById('dpNext').textContent = next ? next.name : '';
      document.getElementById('dpPrevKm').textContent = prev ? fmtKm(tr._segKm[dw.i - 1]) : '';
      document.getElementById('dpNextKm').textContent = next ? fmtKm(tr._segKm[dw.i]) : '';
      plate.querySelector('.side.left').style.visibility = prev ? 'visible' : 'hidden';
      plate.querySelector('.side.right').style.visibility = next ? 'visible' : 'hidden';
    }
    plate.classList.add('show');
  } else { plate.classList.remove('show'); state._plateStop = null; }
  // 即時時速(取前後 20 秒位移換算);大數字讀數,看著有速度感
  const pa = trainPos(tr, state.simSec), pb = trainPos(tr, state.simSec + 20);
  const kmh = (pa && pb) ? haversineKm(pa, pb) / 20 * 3600 : 0;
  document.getElementById('fpSpd').innerHTML = '<b>' + Math.round(kmh) + '</b> km/h';
  // 旅程進度條
  const pr = journeyProgress(tr, effT(tr));
  document.getElementById('fpProgFill').style.width =
    (pr.total > 0 ? Math.min(100, pr.done / pr.total * 100) : 0).toFixed(1) + '%';
  document.getElementById('fpProgTxt').textContent =
    Math.round(pr.done) + ' / ' + Math.round(pr.total) + ' km';
  // 速度曲線游標每秒重畫一次就夠
  const nw = performance.now();
  if (!state._sparkAt || nw - state._sparkAt > 1000) { state._sparkAt = nw; drawSpark(tr, effT(tr)); }
  // 時刻表高亮:過站變淡、下一停靠站標紅
  const tt = document.getElementById('tcStops');
  if (!tt.hidden) {
    const t2 = effT(tr);
    let cur = null;
    for (let i = 0; i < tr.stops.length; i++) {
      const s = tr.stops[i];
      if (s.stop === false) continue;
      if (t2 <= s.depSec) { cur = i; break; }
    }
    if (cur !== state._tcCurIdx) {
      state._tcCurIdx = cur;
      tt.querySelectorAll('.tc-st[data-i]').forEach(r => {
        const i = +r.dataset.i;
        r.classList.toggle('cur', i === cur);
        r.classList.toggle('past', cur != null && i < cur);
      });
    }
  }
}

function recenterTo(lat, lon) {
  // pin the train to the exact centre every frame (no dead-zone -> no snap-back jitter);
  // skip only when the centre is already there (train dwelling / paused) to avoid event spam
  const c = map.getCenter();
  if (Math.abs(c.lat - lat) < 1e-6 && Math.abs(c.lng - lon) < 1e-6) return;
  map.setView([lat, lon], map.getZoom(), { animate: false });
}

function setFollowStatus(s, msg) {

function updateFollowCamera() {
  const tr = state.followTrain; if (!tr) return;
  if (state._transition) { updateFollowPanel(tr); return; } // flyTo 轉場中不搶鏡頭
  const last = tr.stops[tr.stops.length - 1];
  if (effT(tr) > last.arrSec + 2) {
    if (state.followStatus !== 'done') recordRide(tr); // 抵達那一刻蓋完乘章
    setFollowStatus('done', '已抵達');
    return;
  }
  const pos = trainPos(tr, state.simSec);
  if (!pos) { const f = tr.stops[0]; recenterTo(f.lat, f.lon); setFollowStatus('pre', '尚未發車'); return; }
  setFollowStatus('run', '');
  recenterTo(pos.lat, pos.lon);
  updateFollowPanel(tr);
}

function nowSecOfDay() {
  const d = new Date();
  return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
}

// ── 台鐵即時誤點(TDX TrainLiveBoard,經 /api/tra-live 代理,每分鐘更新) ──
// 修正語意:誤點 N 分的車=照時刻表晚 N 分跑,trainPos 等函式把該車的查詢時間回撥 N 分。
// 只在「模擬時鐘貼近現在時刻」時套用——時間旅行/高倍速時自動停用,回到純時刻表模擬。
function liveActive() {
  return !!(state.live && state.mode === 'sched' &&
    Date.now() - state.live.at < 300e3 &&
    Math.abs(state.simSec - nowSecOfDay()) <= 120);
}
function liveDelaySec(tr) {
  if (!liveActive()) return 0;
  return (state.live.map.get(String(tr.train)) || 0) * 60;
}
async function pollLive() {
  if (document.hidden || state.mode !== 'sched') return;
  try {
    const r = await fetch('api/tra-live', { cache: 'no-store' });
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    if (!Array.isArray(d.trains)) throw new Error('bad payload');
    const m = new Map(); let delayed = 0;
    for (const t of d.trains) { m.set(String(t.no), t.delay || 0); if (t.delay > 0) delayed++; }
    state.live = { map: m, at: Date.now(), delayed, srcAt: d.at };
  } catch (e) { /* 失敗保留舊資料;超過 5 分鐘未更新由 liveActive 自動停用 */ }
  updateLiveBadge();
}
function updateLiveBadge() {
  const el = document.getElementById('liveBadge');
  const on = liveActive();
  el.hidden = !on;
  if (on) el.title = `台鐵即時誤點已套用(每分鐘更新)· ${state.live.delayed} 班誤點中 · 來源 ${String(state.live.srcAt).slice(11, 16)}`;
  // LIVE 亮起時收掉「時刻表模擬」標籤,兩者並排語意矛盾;熄滅後每秒刷新會自動恢復
  document.getElementById('peak').hidden = on && !state.nightReplay;
}
setInterval(pollLive, 60e3);
document.addEventListener('visibilitychange', () => { if (!document.hidden) pollLive(); });
pollLive();

function jumpToNow() {
  if (state.mode === 'sched') {
    setSimSec(nowSecOfDay());
    setSpeed(1); // 「現在」=回到真實狀態:1× 才不會馬上漂走,誤點修正得以持續套用
    pollLive();
  } else {
    state.hour = Math.min(24, Math.max(5, new Date().getHours()));
    document.getElementById('tod').value = state.hour;
    document.getElementById('todOut').textContent = fmtHour(state.hour);
    refreshBadge();
    if (state.data) recomputeTrains();
  }
}

// ── 車站時刻板 ──
function openBoard(st) { closeFavPanel(); closeRidePanel(); closeExplorePanel(); state.boardStation = st; renderBoard(); }
function closeBoard() {
  state.boardStation = null;
  const el = document.getElementById('board');
  el.hidden = true; el.innerHTML = '';
}
function renderBoard() {
  const el = document.getElementById('board'), st = state.boardStation;
  if (!st) { el.hidden = true; return; }
  state.boardRenderedAt = state.simSec;
  const rows = [];
  for (const tr of state.trains) {
    const stops = tr.stops;
    for (let i = 0; i < stops.length; i++) {
      const s = stops[i];
      if (s.name !== st.name || s.stop === false) continue;
      const isLast = i === stops.length - 1;
      const t = isLast ? s.arrSec : s.depSec;
      const dl = Math.round(liveDelaySec(tr) / 60);
      let dtm = t + dl * 60 - state.simSec; // 誤點車以估計實際時刻排序/倒數
      if (dtm > 43200) dtm -= 86400; else if (dtm < -43200) dtm += 86400; // 跨午夜換日對齊
      if (dtm < -30 || dtm > 3 * 3600) continue; // 未來 3 小時內
      rows.push({ tr, t, dtm, dl, isLast, dest: stops[stops.length - 1].name });
    }
  }
  rows.sort((a, b) => a.dtm - b.dtm);
  const list = rows.slice(0, 12).map(r => {
    const min = r.dtm < 60 ? '即將' : Math.round(r.dtm / 60) + ' 分';
    const dest = r.isLast ? '（終點到達）' : '往 ' + r.dest;
    return `<div class="row" data-no="${r.tr.train}" title="跟隨 ${r.tr.train} 次"><span class="dot" style="background:${r.tr.color}"></span>` +
      `<b>${r.tr.train}</b><span class="dest">${r.tr.typeName}　${dest}</span>` +
      `<span class="t">${fmtHM(r.t % 86400)}${r.dl > 0 ? `<span class="lateTag">+${r.dl}</span>` : ''}</span><span class="min">${min}</span></div>`;
  }).join('');
  el.innerHTML = `<button class="close" id="boardClose">×</button>` +
    `<h3>${st.name}</h3><div class="sub">接下來 3 小時會有誰來 · ${liveActive() ? '已套用台鐵即時誤點' : '依時刻表（無誤點資訊）'} · 點班次跟隨</div>` +
    (list || '<div class="empty">此時段無停靠班次</div>');
  el.hidden = false;
  el.querySelector('#boardClose').onclick = closeBoard;
  // 點任一班次列 → 關看板、跟隨該車。
  // 看板每 20 模擬秒重繪(高倍速=不到半秒),按下到放開之間列可能被換掉、click 目標變成容器,
  // 所以 pointerdown 先把車次記在持久的 el 上,click 撈不到列時用記下的補。
  el.onpointerdown = e => {
    const row = e.target.closest('.row[data-no]');
    el._downNo = row ? row.dataset.no : null;
  };
  el.onclick = e => {
    const row = e.target.closest('.row[data-no]');
    const no = row ? row.dataset.no : el._downNo;
    el._downNo = null;
    if (no) { closeBoard(); followTrainNo(no); }
  };
}

// ── 尖峰流量分析 ──
const FLOW_BINS = 144; // 10 分鐘一格
function computeFlow() {
  const counts = new Array(FLOW_BINS).fill(0);
  for (const tr of state.trains) {
    const a = tr.stops[0].arrSec, b = tr.stops[tr.stops.length - 1].depSec;
    let i0 = Math.max(0, Math.floor(a / 600)), i1 = Math.floor(b / 600); // 跨午夜:i 可超過 143,bin 取模
    for (let i = i0; i <= i1; i++) {
      const t = i * 600 + 300;
      if (t >= a && t <= b) counts[i % FLOW_BINS]++;
    }
  }
  state.flowBins = counts;
  state.flowMax = Math.max(1, ...counts);
}
function drawFlow() {
  const c = document.getElementById('flowChart');
  if (!c || document.getElementById('flowWrap').hidden || !state.flowBins) return;
  const cssW = c.clientWidth, cssH = c.clientHeight, dpr = state.dpr || 1;
  if (c.width !== Math.round(cssW * dpr)) { c.width = Math.round(cssW * dpr); c.height = Math.round(cssH * dpr); }
  const g = c.getContext('2d');
  g.setTransform(dpr, 0, 0, dpr, 0, 0);
  g.clearRect(0, 0, cssW, cssH);
  // 尖峰帶 07:00–09:00 / 17:00–19:30
  g.fillStyle = 'rgba(210,60,42,0.08)';
  g.fillRect(7 / 24 * cssW, 0, 2 / 24 * cssW, cssH);
  g.fillRect(17 / 24 * cssW, 0, 2.5 / 24 * cssW, cssH);
  // 柱
  const bw = cssW / FLOW_BINS;
  for (let i = 0; i < FLOW_BINS; i++) {
    const h = state.flowBins[i] / state.flowMax * (cssH - 12);
    g.fillStyle = '#8fa8c6';
    g.fillRect(i * bw, cssH - h, Math.max(1, bw - 0.6), h);
  }
  // 整點刻度(00/06/12/18 較高)
  g.fillStyle = '#c9b98f';
  for (let hh = 0; hh < 24; hh++) {
    const tx = hh / 24 * cssW, th = (hh % 6 === 0) ? 7 : 4;
    g.fillRect(tx, cssH - th, 1, th);
  }
  // 現在時刻游標
  const x = state.simSec / 86400 * cssW;
  g.strokeStyle = '#d23c2a'; g.globalAlpha = 0.9; g.lineWidth = 1.5;
  g.beginPath(); g.moveTo(x, 2); g.lineTo(x, cssH - 2); g.stroke(); g.globalAlpha = 1;
}
const FLOW_LBL_DEFAULT = '全日同時運行列車數（依時刻表）——點擊圖表跳到該時刻';

  state._setFs = setFs;
  window.addEventListener('resize', () => {
    if (document.body.classList.contains('fs')) placeFsOverlays(true);
  });
  fsBtn.onclick = () => setFs(!document.body.classList.contains('fs'));
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && document.body.classList.contains('fs')) setFs(false); });
  themeBtn.onclick = () => {
    state.mapDark = !state.mapDark;
    try { localStorage.setItem('trainmap-theme', state.mapDark ? 'dark' : 'light'); } catch (e) {}
    setBasemap();
  };
  satBtn.onclick = () => {
    state.basemap = state.basemap === 'sat' ? 'map' : 'sat';
    try { localStorage.setItem('trainmap-basemap', state.basemap); } catch (e) {}
    setBasemap();
  };
}

async function boot() {
  document.getElementById('buildVer').textContent = BUILD;
  console.log('台灣鐵道·列車流動 BUILD', BUILD);
  cv = document.getElementById('overlay'); ctx = cv.getContext('2d');
  map = L.map('map', { zoomControl: true, attributionControl: true, preferCanvas: true })
    .setView([24.5, 121], 8);
  map.zoomControl.setPosition('bottomright'); // 右上讓給車站時刻板
  map.on('click', e => {
    if (state.mode !== 'sched') return;
    const cp = e.containerPoint || map.latLngToContainerPoint(e.latlng);
    let best = null, bd = 1e9;
    for (const st of state.schedStations) {
      const p = map.latLngToContainerPoint([st.lat, st.lon]);
      const d = Math.hypot(p.x - cp.x, p.y - cp.y);
      if (d < bd) { bd = d; best = st; }
    }
    // 車與站都在範圍內時取較近者:點列車跟隨(再點一下取消)、點車站開時刻板
    const hit = trainAt(cp);
    if (hit && (bd > 16 || hit.dist <= bd)) {
      if (hit.tr === state.followTrain) { setAutoTour(false); clearFollow(); return; }
      const ts = document.getElementById('trainSearch');
      if (ts) ts.value = hit.tr.train;
      setFollow(hit.tr);
      return;
    }
    if (best && bd <= 16) openBoard(best);
  });
  map.on('mousemove', e => {
    // 滑過列車 → 手指游標(僅台鐵真實班表)
    const c = map.getContainer();
    if (state.mode !== 'sched') { if (c.style.cursor) c.style.cursor = ''; return; }
    c.style.cursor = trainAt(e.containerPoint) ? 'pointer' : '';
  });
  baseLayers.light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 20, attribution: '&copy; OpenStreetMap &copy; CARTO',
  });
  baseLayers.dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 20, attribution: '&copy; OpenStreetMap &copy; CARTO',
  });
  baseLayers.sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 19, attribution: 'Tiles &copy; Esri — Source: Esri, Maxar, Earthstar Geographics',
  });
  try { state.mapDark = localStorage.getItem('trainmap-theme') === 'dark'; } catch (e) {}
  try { state.basemap = localStorage.getItem('trainmap-basemap') === 'sat' ? 'sat' : 'map'; } catch (e) {}
  setBasemap();
  setupMapTools();
  map.on('move zoom resize zoomanim', reproject);

  const defs = [
    { id: 'tra_sched', label: '台鐵', url: './data/tra_schedule_dense.json', mode: 'sched' },
    { id: 'mrt', label: '台北捷運', url: './data/trtc.json', speed: 34, mode: 'freq' },
    { id: 'krtc', label: '高雄捷運', url: './data/krtc.json', speed: 36, mode: 'freq' },
    { id: 'tmrt', label: '台中捷運', url: './data/tmrt.json', speed: 32, mode: 'freq' },
  ];
  for (const d of defs) {
    const data = await fetchJSON(d.url);
    if (data) state.systems.push({ ...d, data });
  }
  // tra.json 僅作真實班表模式的軌道底圖幾何,不列為可切換系統(台鐵班距模式已移除)
  state.trackData = await fetchJSON('./data/tra.json');
  // 站等資料(特等/一等/…),缺檔就全走停靠班次數啟發式
  state.stnClassMap = await fetchJSON('./data/tra_station_class.json') || {};
  // 特別列車故事檔案(車型/具名觀光列車/支線);缺檔時 specialOf 回 null,退回內建簡版介紹
  state.special = await fetchJSON('./data/tra_special_trains.json');
  if (state.special) state.special.branchLines.forEach(b => { b._set = new Set(b.matchStations); });
  if (!state.systems.length) {
    document.getElementById('note').textContent = '找不到路網資料（data/*.json 還在準備）';
    return;
  }
  buildSystemToggle();
  // 深連結:?train=5899&t=11:00 直接在該時刻跟隨該車次(可分享)。要在 loadSystem 前讀,clearFollow 會清掉 query
  let deepTrain = null, deepT = null;
  try {
    const qs = new URLSearchParams(location.search);
    deepTrain = qs.get('train');
    const m = /^(\d{1,2}):(\d{2})$/.exec(qs.get('t') || '');
    if (m) deepT = (+m[1] % 24) * 3600 + (+m[2]) * 60;
  } catch (e) {}
  const initial = state.systems.find(s => s.id === 'tra_sched') || state.systems[0];
  loadSystem(initial);
  if (deepTrain && state.mode === 'sched') {
    if (deepT != null) setSimSec(deepT);
    const tr0 = findTrain(deepTrain);
    if (tr0) { document.getElementById('trainSearch').value = tr0.train; setFollow(tr0); }
  }
  state.ready = true;
  requestAnimationFrame(tick);
}

document.getElementById('pp').onclick = togglePlay;
document.getElementById('speed').oninput = e => setSpeed(parseFloat(e.target.value));
document.querySelectorAll('#spdBtns button').forEach(b => {
  b.onclick = () => setSpeed(+b.dataset.v);
});
document.getElementById('tod').oninput = e => {
  if (state.mode === 'sched') {
    setSimSec(parseInt(e.target.value, 10) * 60);
  } else {
    state.hour = parseInt(e.target.value, 10);
    document.getElementById('todOut').textContent = fmtHour(state.hour);
    refreshBadge();
    if (state.data) recomputeTrains();
  }
};
document.getElementById('nowBtn').onclick = jumpToNow;
document.getElementById('fpClose').onclick = () => { setAutoTour(false); clearFollow(); };
document.getElementById('tcStar').onclick = () => toggleFav(state.followTrain);
document.getElementById('tourBtn').onclick = () => setAutoTour(!state.autoTour);
document.getElementById('rideBtn').onclick = () => {
  document.getElementById('ridePanel').hidden ? openRidePanel() : closeRidePanel();
};
document.getElementById('favBtn').onclick = () => {
  document.getElementById('favPanel').hidden ? openFavPanel() : closeFavPanel();
};
document.getElementById('exploreBtn').onclick = () => {
  document.getElementById('explorePanel').hidden ? openExplorePanel() : closeExplorePanel();
};
document.getElementById('favPanel').onclick = e => {
  const rm = e.target.closest('.rm');
  if (rm) { removeFav(rm.dataset.no); return; }
  const row = e.target.closest('.row.fv');
  if (row) { closeFavPanel(); followTrainNo(row.dataset.no); }
};
// 資訊卡兩個可收放區:停靠時刻表與全程速度曲線
function setStopsOpen(open) {
  document.getElementById('tcStops').hidden = !open;
  document.getElementById('tcTT').textContent = open ? '時刻表 ▴' : '時刻表 ▾';
  if (open) { state._tcCurIdx = null; if (state.followTrain) updateFollowPanel(state.followTrain); }
}
function setSparkOpen(open) {
  document.querySelector('.tc-sparkwrap').hidden = !open;
  document.getElementById('tcSC').textContent = open ? '曲線 ▴' : '曲線 ▾';
}
document.getElementById('tcTT').onclick = () => setStopsOpen(document.getElementById('tcStops').hidden);
document.getElementById('tcSC').onclick = () => setSparkOpen(document.querySelector('.tc-sparkwrap').hidden);
document.getElementById('tcStops').onclick = e => {
  const row = e.target.closest('.tc-st');
  if (!row || row.classList.contains('hd') || !state.followTrain) return;
  const s = state.followTrain.stops[+row.dataset.i];
  if (s) setSimSec(Math.max(0, s.arrSec - 30));
};
// 快捷鍵:空白鍵暫停、1–4 速度、←→ 時間 ±10 分、F 全畫面(輸入框內不攔截)
document.addEventListener('keydown', e => {
  const tg = e.target;
  if (tg && (tg.tagName === 'INPUT' || tg.tagName === 'TEXTAREA' || tg.isContentEditable)) return;
  if (tg && tg.tagName === 'BUTTON') tg.blur(); // 避免空白鍵同時觸發聚焦中的按鈕
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  else if (e.key === 'f' || e.key === 'F') document.getElementById('fsBtn').click();
  else if (e.key === 'ArrowLeft' && state.mode === 'sched') setSimSec(state.simSec - 600);
  else if (e.key === 'ArrowRight' && state.mode === 'sched') setSimSec(state.simSec + 600);
  else { const v = { 1: 1, 2: 10, 3: 30, 4: 60 }[e.key]; if (v) setSpeed(v); }
});
document.getElementById('ambientBtn').onclick = () => setAmbient(!state.ambient);
initMusic();
(() => {
  const fc = document.getElementById('flowChart'), lbl = document.getElementById('flowLbl');
  const timeAt = e => Math.max(0, Math.min(86399, e.offsetX / fc.clientWidth * 86400));
  fc.addEventListener('click', e => {
    if (state.mode !== 'sched') return;
    setSimSec(timeAt(e));
  });
  fc.addEventListener('mousemove', e => {
    if (!state.flowBins) return;
    const t = timeAt(e), n = state.flowBins[Math.min(FLOW_BINS - 1, Math.floor(t / 600))];
    lbl.textContent = `${fmtHM(t)} · 約 ${n} 列同時運行——點擊跳到該時刻`;
  });
  fc.addEventListener('mouseleave', () => { lbl.textContent = FLOW_LBL_DEFAULT; });
})();
(() => {
  const ts = document.getElementById('trainSearch');
  const go = () => {
    const q = ts.value.trim(); if (!q) { clearFollow(); return; }
    const tr = findTrain(q);
    if (tr) setFollow(tr); else showSearchMiss(q);
  };
  ts.addEventListener('change', go);
  ts.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
})();
window.addEventListener('load', boot);
</script>
</body>
